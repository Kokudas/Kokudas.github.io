<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>StageB v0.9 · 환각 확률 계산 (floor 고정)</title>
<style>
:root{--bg:#081120;--card:#0f1930;--ink:#e9f1ff;--muted:#a7b3d1;--pri:#6aa6ff;--ok:#4ade80;--chip:#1b2740}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#081120,#0b1220);color:var(--ink);font:15px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,Arial}
.wrap{max-width:1180px;margin:28px auto;padding:0 16px}
h1{margin:0 0 10px;font-size:22px}
.pill{display:inline-block;padding:4px 10px;border-radius:999px;background:#0e2246;border:1px solid #243251;color:#9fb2e7;font-weight:700}
.grid{display:grid;gap:14px}
.card{background:var(--card);border:1px solid #1c2844;border-radius:16px;padding:16px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
label{display:block;color:var(--muted);font-weight:700;margin-bottom:6px}
input,button,select{width:100%;padding:14px;border-radius:12px;border:1px solid #243251;background:#0e1729;color:var(--ink);font-size:16px}
button{cursor:pointer;font-weight:900;background:var(--pri);border:none;color:#061022}
button.ghost{background:#102246;color:var(--ink);border:1px solid #243251}
.row{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}
.col-12{grid-column:span 12}.col-8{grid-column:span 8}.col-6{grid-column:span 6}.col-4{grid-column:span 4}.col-3{grid-column:span 3}
@media(max-width:900px){.col-8,.col-6,.col-4,.col-3{grid-column:span 12}}
.kbdbar{display:flex;gap:6px;flex-wrap:wrap}
.kbdbar button{width:auto;padding:8px 10px;font-size:14px;background:#14254a}
.list{max-height:46vh;overflow:auto;border:1px solid #25345d;border-radius:12px}
.item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid #1b2746}
.item:hover{background:#122147} .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
.big{font-size:28px;font-weight:900}
.small{color:var(--muted);font-size:13px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.chip{background:var(--chip);border:1px solid #233055;border-radius:999px;padding:6px 10px;color:#9fb2e7;font-weight:700}
.table{overflow:auto;max-height:56vh;border:1px solid #233055;border-radius:12px}
table{width:100%;border-collapse:separate;border-spacing:0}
th,td{padding:10px 12px;border-bottom:1px solid #1c2746;white-space:nowrap;text-align:right}
thead th{position:sticky;top:0;background:#102246;color:#cfe0ff}
td:first-child,th:first-child{text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <h1>StageB v0.9 · 환각 확률 계산</h1>
  <div class="chips"><span class="chip">표기 라운딩: floor 고정</span><span class="chip">환각 확률만 표시</span></div>

  <div class="row" style="margin-top:14px">
    <div class="col-4">
      <div class="card grid">
        <div>
          <label>검색</label>
          <input id="q" placeholder="페트 이름 입력(부분/초성 검색 지원)"/>
        </div>
        <div>
          <div class="kbdbar" id="kbd"></div>
        </div>
        <div class="list" id="list"></div>
        <div class="row">
          <div class="col-6"><button class="ghost" id="btnImport">JSON 불러오기</button></div>
          <div class="col-6"><button class="ghost" id="btnReset">디버그: 저장 리셋</button></div>
        </div>
        <input id="fileJson" type="file" accept="application/json" style="display:none"/>
        <div class="small">StageA에서 저장한 데이터 또는 JSON 파일을 선택하세요.</div>
      </div>
    </div>

    <div class="col-8">
      <div class="card">
        <div class="row">
          <div class="col-12"><label>선택된 페트</label><div id="selInfo" class="pill">—</div></div>
          <div class="col-12"><label>정수 표기 초기치(1레벨)</label></div>
          <div class="col-3"><input id="intHP" type="number" placeholder=""></div>
          <div class="col-3"><input id="intATK" type="number" placeholder=""></div>
          <div class="col-3"><input id="intDEF" type="number" placeholder=""></div>
          <div class="col-3"><input id="intAGI" type="number" placeholder=""></div>
          <div class="col-6"><label>시뮬레이션 샘플(조건부 추정 한계)</label><input id="samples" type="number" value="0" min="0"/></div>
          <div class="col-6"><label>계산</label><button id="run">환각 확률 계산</button></div>
        </div>

        <div style="margin-top:12px" class="big" id="headline">성공 확률 : —</div>
        <div class="small" id="subline"></div>
      </div>

      <div class="card">
        <div class="table">
          <table id="tbl"><thead>
            <tr><th>#</th><th>일치</th><th>랭크</th><th>initnum</th><th>baseS [H/A/D/G]</th><th>p(Int|cand)</th><th>p(환각|Int,cand)</th></tr>
          </thead><tbody></tbody></table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ========== 공통 ==========
const AAVG=2.5;
function dispFromRaw(h,a,d,g){return [4*h+a+d+g,0.1*h+a+0.1*d+0.05*g,0.1*h+0.1*a+d+0.05*g,g];}
function chosung(str){const BASE=0xAC00,LAST=0xD7A3,CHO=["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];let out="";
 for(const ch of str){const c=ch.charCodeAt(0); if(c>=BASE&&c<=LAST){const off=c-BASE; out+=CHO[Math.floor(off/588)];} else out+=ch;} return out;}

// ========== 좌측: 검색/자음 ==========
const q=document.getElementById('q'), list=document.getElementById('list'), kbd=document.getElementById('kbd');
const initials=["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ","#"];
function loadDB(){try{const db=JSON.parse(localStorage.getItem('PetDB')||'[]'); return db;}catch{return []}}
function loadPayloadByKey(key){try{const raw=localStorage.getItem(key); return raw?JSON.parse(raw):null;}catch{return null}}
function renderList(filter=""){const db=loadDB(); list.innerHTML="";
 const f=filter.trim(); const fcho=chosung(f);
 db.sort((a,b)=>a.petName.localeCompare(b.petName,'ko')); 
 const rows=db.filter(x=>{
  if(!f) return true;
  const n=x.petName; return n.includes(f) || chosung(n).includes(fcho);
 });
 if(rows.length===0){list.innerHTML=`<div class="item small">결과 없음</div>`; return;}
 rows.forEach(r=>{
  const div=document.createElement('div'); div.className='item';
  div.innerHTML=`<div>${r.petName}</div><div class="small mono">${new Date(r.savedAt).toLocaleString()}</div>`;
  div.onclick=()=>selectKey(r.key);
  list.appendChild(div);
 });
}
initials.forEach(ch=>{
 const b=document.createElement('button'); b.textContent=ch; b.onclick=()=>{
   if(ch==="#"){ q.value=""; renderList(""); return; }
   q.value=ch; renderList(ch);
 }; kbd.appendChild(b);
});
q.addEventListener('input',()=>renderList(q.value));
renderList("");

// 파일 불러오기
document.getElementById('btnImport').onclick=()=>document.getElementById('fileJson').click();
document.getElementById('fileJson').onchange=e=>{
  const f=e.target.files?.[0]; if(!f) return;
  const r=new FileReader(); r.onload=()=>{
    try{
      const obj=JSON.parse(r.result);
      current = normalizePayload(obj);
      selInfo.textContent=`파일: ${current.petName} · 후보 ${current.candidates.length}개`;
      renderTable([], current.candidates);
    }catch(err){alert('JSON 파싱 실패');}
  }; r.readAsText(f);
};
document.getElementById('btnReset').onclick=()=>{ if(confirm('로컬 저장 전체(PetDB/StageA_*)를 지울까요?')){ 
  const db=loadDB(); db.forEach(x=>localStorage.removeItem(x.key)); localStorage.removeItem('PetDB');
  alert('초기화 완료'); renderList(""); selInfo.textContent='—'; current=null; renderTable([],[]);
}};

// ========== 우측: 계산 ==========
const selInfo=document.getElementById('selInfo');
const tblBody=document.getElementById('tbl').querySelector('tbody');
const headline=document.getElementById('headline'); const subline=document.getElementById('subline');

function normalizePayload(p){
  if(!p) return null;
  return { petName:p.petName||'(무명)', targetGrow:Array.isArray(p.targetGrow)?p.targetGrow:[0,0,0,0],
           initRound:'floor', candidates:(p.candidates||[]).map(c=>({rank:c.rank,initnum:c.initnum,base:c.base,score:c.score})) };
}
let current=null;
function selectKey(key){
  const p=loadPayloadByKey(key); const obj=normalizePayload(p);
  if(!obj){alert('불러오기 실패'); return;}
  current=obj; selInfo.textContent=`${obj.petName} · 후보 ${obj.candidates.length}개`;
  renderTable([], obj.candidates);
}

function renderTable(matchIdxs, all){
  tblBody.innerHTML=''; const set=new Set(matchIdxs);
  all.forEach((c,i)=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${i+1}</td><td>${set.has(i)?'✓':''}</td><td>${c.rank}</td><td>${c.initnum}</td><td>[${c.base.map(v=>Number(v).toFixed(3)).join(' / ')}]</td><td>-</td><td>-</td>`;
    tblBody.appendChild(tr);
  });
}

// ----- 환각 확률 계산 (floor 고정, 등급분포 제거) -----
const partitions = (()=>{ // 10을 4칸에 분배(286가지)
  const out=[]; for(let h=0;h<=10;h++)for(let a=0;a<=10-h;a++)for(let d=0;d<=10-h-a;d++){const g=10-h-a-d; out.push([h,a,d,g]);}
  return out;
})();
const rvals=[-2,-1,0,1,2];

function countForCand(cand, intHADG){ // p(Int|cand)와 p(halluc|Int,cand)
  const {initnum, base}=cand;
  let match=0, hall=0;
  for(const rh of rvals)for(const ra of rvals)for(const rd of rvals)for(const rg of rvals){
    for(const b of partitions){
      const bh=base[0]+rh+b[0], ba=base[1]+ra+b[1], bd=base[2]+rd+b[2], bg=base[3]+rg+b[3];
      const h=initnum*(bh + AAVG)/100, a=initnum*(ba + AAVG)/100, d=initnum*(bd + AAVG)/100, g=initnum*(bg + AAVG)/100;
      const disp=dispFromRaw(h,a,d,g).map(Math.floor);
      if(disp[0]===intHADG[0] && disp[1]===intHADG[1] && disp[2]===intHADG[2] && disp[3]===intHADG[3]){
        match++;
        if(rh===2 && ra===2 && rd===2 && rg===2) hall++;
      }
    }
  }
  return {match, hall};
}

document.getElementById('run').onclick=()=>{
  if(!current){alert('좌측에서 페트를 선택하거나 JSON을 불러오세요.'); return;}
  const ints=[+document.getElementById('intHP').value,+document.getElementById('intATK').value,+document.getElementById('intDEF').value,+document.getElementById('intAGI').value];
  if(ints.some(x=>!Number.isFinite(x))){alert('정수 표기 초기치 4개를 모두 입력하세요.'); return;}
  const cands=current.candidates||[]; if(cands.length===0){alert('후보가 없습니다.'); return;}

  const weights=new Array(cands.length).fill(0);
  const condHall=new Array(cands.length).fill(0);
  const matchedIdx=[];
  let wsum=0;

  // 무거운 계산: Web Worker 없이도 돌아가지만 후보가 많으면 시간이 걸릴 수 있음
  // 최적화: 일치가 0인 후보는 가중치 0
  cands.forEach((c,i)=>{
    const {match,hall}=countForCand(c,ints);
    if(match>0){ matchedIdx.push(i); condHall[i]=hall/match; weights[i]=match; wsum+=weights[i]; }
  });

  // 표 렌더
  tblBody.innerHTML='';
  cands.forEach((c,i)=>{
    const tr=document.createElement('tr'); const chk=matchedIdx.includes(i);
    tr.innerHTML=`<td>${i+1}</td><td>${chk?'✓':''}</td><td>${c.rank}</td><td>${c.initnum}</td><td>[${c.base.map(v=>Number(v).toFixed(3)).join(' / ')}]</td><td>${chk?(weights[i]/(286*625)).toFixed(6):'0.000000'}</td><td>${chk?(condHall[i]*100).toFixed(4)+'%':'—'}</td>`;
    tblBody.appendChild(tr);
  });

  if(wsum===0){
    headline.textContent='성공 확률 : 0.0000%';
    subline.textContent='정수 초기치를 만들 수 있는 후보가 없습니다.';
    return;
  }
  // 최종: Σ p(Int|cand)·p(hall|Int,cand) / Σ p(Int|cand)
  const p = cands.reduce((s,_,i)=> s + (weights[i]*condHall[i]), 0) / wsum;
  headline.textContent = `성공 확률 : ${(p*100).toFixed(4)}%`;
  subline.textContent   = `일치 후보 ${matchedIdx.length}/${cands.length} · floor · 가중치합=${wsum}`;
};
</script>
</body>
</html>
