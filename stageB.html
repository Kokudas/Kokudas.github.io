<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>StageB v1.1 · 환각 확률 계산(단일 계수·floor)</title>
  <style>
    :root{--bg:#0b1220;--card:#111a2b;--ink:#e7eef8;--muted:#8aa0bd;--pri:#7aa2ff;--ok:#19c37d;--warn:#ffb545;--bad:#ff5c5c;--line:#1d2a45;--chip:#1a2340}
    *{box-sizing:border-box}
    body{margin:0;background:linear-gradient(180deg,#0b1220,#0e1729);color:var(--ink);font:15px/1.6 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,"Apple SD Gothic Neo","Noto Sans KR",sans-serif}
    header{position:sticky;top:0;z-index:10;background:rgba(11,18,32,.8);backdrop-filter:blur(6px);border-bottom:1px solid var(--line)}
    .wrap{max-width:1100px;margin:0 auto;padding:12px 16px;display:flex;gap:12px;align-items:center}
    a{color:var(--pri);text-decoration:none}
    main{max-width:1100px;margin:24px auto;padding:0 16px;display:grid;grid-template-columns:1.1fr .9fr;gap:18px}
    @media(max-width:980px){main{grid-template-columns:1fr}}
    .card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
    .card h2{margin:0;padding:14px 16px;border-bottom:1px solid var(--line);font-size:18px;color:#d8e6ff}
    .card .body{padding:16px}
    input,button{width:100%;padding:12px;border-radius:12px;border:1px solid #253250;background:#0d1526;color:var(--ink)}
    button{cursor:pointer;font-weight:800}
    .btn{background:#132347;border-color:#2a3a5e}
    .btn:hover{background:#162a55}
    .btn-ok{background:var(--ok);border-color:#18a56d;color:#04120d}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .row4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    .muted{color:var(--muted);font-size:13px}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono","Courier New",monospace}
    .big{font-size:26px;font-weight:900}
    .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
    .chip{background:#1a2340;border:1px solid #26345a;color:#bcd1ff;border-radius:999px;padding:6px 10px;font-weight:700;font-size:12px}
    .list{display:flex;gap:10px}
    .col{flex:1}
    .pill{display:inline-block;padding:2px 8px;border:1px solid #2a3a5e;border-radius:999px;font-size:12px;color:#cfe0ff}
    .listbox{border:1px solid var(--line);border-radius:12px;max-height:48vh;overflow:auto;background:#0f172a}
    .item{padding:10px 12px;border-bottom:1px solid #152243;cursor:pointer}
    .item:hover{background:#0f1d38}
    .kbdrow{display:flex;flex-wrap:wrap;gap:6px}
    .kbdrow button{width:auto;padding:8px 10px}
    .recent{display:flex;gap:8px;flex-wrap:wrap}
    .recent .btn{padding:8px 10px}
    .sep{height:1px;background:var(--line);margin:12px 0}
    .warn{color:var(--warn)}
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <strong>StageB v1.1 · 환각 확률 계산</strong>
      <span class="pill">라운딩: floor</span>
      <div style="flex:1"></div>
      <a class="pill" href="./stageA.html">⬅️ StageA로</a>
    </div>
  </header>

  <main>
    <!-- 좌: 데이터 탐색/선택 -->
    <section class="card">
      <h2>데이터 선택</h2>
      <div class="body">
        <div class="chips">
          <span class="chip">단일 계수 세트</span>
          <span class="chip">LocalStorage: <span class="mono">PET_*</span></span>
        </div>
        <div class="sep"></div>

        <div class="row">
          <div>
            <label class="muted">검색</label>
            <input id="q" placeholder="페트 이름"/>
          </div>
          <div>
            <label class="muted">최근 페트</label>
            <div id="recent" class="recent"></div>
          </div>
        </div>

        <div class="sep"></div>

        <div class="kbdrow" id="chosungRow"></div>

        <div class="sep"></div>

        <div class="list">
          <div class="col">
            <div class="muted">검색/초성 결과</div>
            <div id="list" class="listbox"></div>
          </div>
          <div class="col">
            <div class="muted">선택된 데이터</div>
            <div class="listbox" style="padding:12px">
              <div id="selName" class="big">—</div>
              <div id="selInfo" class="mono muted" style="margin-top:6px">—</div>
              <div class="sep"></div>
              <div class="row4">
                <div><label class="muted">HP</label><input id="intHP" type="number" placeholder="체력"/></div>
                <div><label class="muted">ATK</label><input id="intATK" type="number" placeholder="공격력"/></div>
                <div><label class="muted">DEF</label><input id="intDEF" type="number" placeholder="방어력"/></div>
                <div><label class="muted">AGI</label><input id="intAGI" type="number" placeholder="순발력"/></div>
              </div>
              <div class="sep"></div>
              <button class="btn-ok" id="btnRun">환각 확률 계산</button>
              <div class="sep"></div>
              <div id="outHead" class="big">성공 확률 : —</div>
              <div id="outSub" class="muted">—</div>
              <div id="fixBox" class="muted" style="margin-top:10px"></div>
            </div>
          </div>
        </div>

      </div>
    </section>

    <section class="card">
      <h2>요약</h2>
      <div class="body">
        <div class="muted">r∈[-2..2]^4, 보너스합10 전수, <span class="mono">floor</span> 고정.  
          일치 케이스(total) 중 r=[+2,+2,+2,+2] 비율을 환각 확률로 표기.  
          <b class="warn">total=0이면 자동 보정 탐색(IC±2, base 각 ±2)을 수행</b> 후 가장 근접한 세트로 재계산.</div>
      </div>
    </section>
  </main>

<script>
/* ===== 유틸/상수 ===== */
const PET_PREFIX='PET_';
const REC_KEY='_PET_RECENT_KEYS_';
const AAVG=2.5;

const $=s=>document.querySelector(s);
const el=id=>document.getElementById(id);

/* 초성 */
function getChosung(str){
  const BASE=0xAC00,LAST=0xD7A3,L=["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
  let out=""; for(const ch of str){const c=ch.charCodeAt(0); out+= (c>=BASE&&c<=LAST)? L[Math.floor((c-BASE)/588)] : ch;}
  return out;
}
const CHO=["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];

/* 표기 변환 */
function disp(H,A,D,G){
  return [
    4*H + A + D + G,
    0.1*H + A + 0.1*D + 0.05*G,
    0.1*H + 0.1*A + D + 0.05*G,
    G
  ];
}

/* 보너스 전수(합10) */
const bonusPartitions = (()=>{const out=[];for(let h=0;h<=10;h++){for(let a=0;a<=10-h;a++){for(let d=0;d<=10-h-a;d++){const g=10-h-a-d;out.push([h,a,d,g]);}}}return out;})();

/* LocalStorage 스캔 */
function scanPets(){
  const arr=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k && k.startsWith(PET_PREFIX)){
      try{const v=JSON.parse(localStorage.getItem(k)||'null'); if(v && v.petName) arr.push(v);}catch{}
    }
  }
  arr.sort((a,b)=>(a.petName||'').localeCompare(b.petName||'','ko-KR'));
  return arr;
}

/* 인덱스 */
let ALL=[]; let CURRENT=null;
function buildIndex(){
  ALL=scanPets();
  renderRecent();
  renderChosung();
  renderList(ALL);
}
function renderRecent(){
  const box=el('recent'); box.innerHTML='';
  const keys=JSON.parse(localStorage.getItem(REC_KEY)||'[]');
  const byKey=new Map(ALL.map(p=>[PET_PREFIX+p.petName,p]));
  keys.slice(0,10).forEach(k=>{const p=byKey.get(k); if(!p) return; const b=document.createElement('button'); b.className='btn'; b.textContent=p.petName; b.onclick=()=>selectPet(p); box.appendChild(b);});
}
function renderChosung(){
  const row=el('chosungRow'); row.innerHTML='';
  CHO.forEach(ch=>{const b=document.createElement('button'); b.className='btn'; b.textContent=ch; b.onclick=()=>{const filtered=ALL.filter(p=>getChosung(p.petName).startsWith(ch)); renderList(filtered);} ; row.appendChild(b);});
  const allBtn=document.createElement('button'); allBtn.className='btn'; allBtn.textContent='전체'; allBtn.onclick=()=>renderList(ALL); row.appendChild(allBtn);
}
el('q').addEventListener('input', ()=>{const q=el('q').value.trim(); if(!q){renderList(ALL); return;} const qc=getChosung(q); renderList(ALL.filter(p=>p.petName.includes(q)||getChosung(p.petName).includes(qc)));});
function renderList(list){
  const box=el('list'); box.innerHTML='';
  if(list.length===0){ box.innerHTML='<div class="item muted">검색 결과 없음</div>'; return; }
  list.forEach(p=>{const div=document.createElement('div'); div.className='item'; div.innerHTML=`<div><b>${p.petName}</b></div><div class="muted mono">IC=${p.ic}, base=[${(p.base||[]).join(' / ')}], E=${p.E}</div>`; div.onclick=()=>selectPet(p); box.appendChild(div);});
}
function selectPet(p){
  CURRENT=p;
  el('selName').textContent=p.petName||'—';
  el('selInfo').textContent=`IC=${p.ic}, base=[${(p.base||[]).join(' / ')}], E=${p.E}`;
  const key=PET_PREFIX+p.petName;
  const arr=JSON.parse(localStorage.getItem(REC_KEY)||'[]').filter(k=>k!==key); arr.unshift(key); localStorage.setItem(REC_KEY,JSON.stringify(arr.slice(0,50)));
  renderRecent();
}

/* 환각 확률 계산 */
function calcHallucination(p, ints){
  if(!p||!p.base||!Number.isFinite(p.ic)) return {total:0,halluc:0};
  const IC=+p.ic; const B0=p.base.map(z=>+z|0); const target=ints.map(x=>x|0);
  let total=0,halluc=0;
  for(let rh=-2;rh<=2;rh++){
    for(let ra=-2;ra<=2;ra++){
      for(let rd=-2;rd<=2;rd++){
        for(let rg=-2;rg<=2;rg++){
          for(const bp of bonusPartitions){
            const bh=B0[0]+rh+bp[0], ba=B0[1]+ra+bp[1], bd=B0[2]+rd+bp[2], bg=B0[3]+rg+bp[3];
            const H=IC*(bh+AAVG)/100, A=IC*(ba+AAVG)/100, D=IC*(bd+AAVG)/100, G=IC*(bg+AAVG)/100;
            const v=disp(H,A,D,G).map(Math.floor);
            if(v[0]===target[0] && v[1]===target[1] && v[2]===target[2] && v[3]===target[3]){
              total++; if(rh===2&&ra===2&&rd===2&&rg===2) halluc++;
            }
          }
        }
      }
    }
  }
  return {total,halluc};
}

/* Auto-Fix: total==0일 때 IC±2, base 각 ±2 탐색 */
function autoFixAndCalc(p, ints){
  const orig={ic:+p.ic, base:p.base.map(x=>+x|0)};
  let best=null;
  for(let dIC=-2; dIC<=2; dIC++){
    const IC=orig.ic+dIC; if(IC<=0) continue;
    for(let dh=-2; dh<=2; dh++){
      for(let da=-2; da<=2; da++){
        for(let dd=-2; dd<=2; dd++){
          for(let dg=-2; dg<=2; dg++){
            const B=[orig.base[0]+dh, orig.base[1]+da, orig.base[2]+dd, orig.base[3]+dg];
            const tmp={ic:IC, base:B, E:p.E, petName:p.petName};
            const r=calcHallucination(tmp, ints);
            if(r.total>0){
              const score = -r.total + Math.abs(dIC)*5 + (Math.abs(dh)+Math.abs(da)+Math.abs(dd)+Math.abs(dg)); // 우선 total>0, 변화량은 최소
              if(!best || score<best.score){
                best={score, ic:IC, base:B, res:r};
              }
            }
          }
        }
      }
    }
  }
  return best; // null이면 실패
}

/* 실행 */
el('btnRun').onclick=()=>{
  if(!CURRENT){ alert('왼쪽에서 페트를 선택하세요.'); return; }
  const ints=[+el('intHP').value, +el('intATK').value, +el('intDEF').value, +el('intAGI').value];
  if(ints.some(v=>!Number.isFinite(v))){ alert('HP/ATK/DEF/AGI 정수값을 모두 입력하세요.'); return; }

  el('fixBox').innerHTML='';
  const t0=performance.now();
  let {total,halluc}=calcHallucination(CURRENT, ints);
  let used = {ic:CURRENT.ic, base:CURRENT.base};
  let fixed = null;

  if(total===0){
    fixed = autoFixAndCalc(CURRENT, ints);
    if(fixed){
      total=fixed.res.total; halluc=fixed.res.halluc;
      used.ic=fixed.ic; used.base=fixed.base;
      const p=(halluc/total)*100;
      el('fixBox').innerHTML=
        `<div class="warn">원본 계수로는 일치 케이스가 없어, 자동 보정(IC±2, base±2)으로 근접 세트를 찾았습니다.</div>
         <div class="mono">IC=${fixed.ic}, base=[${fixed.base.join(' / ')}]</div>
         <button class="btn" id="btnSaveFix">이 값으로 저장</button>`;
      $('#btnSaveFix').onclick=()=>{
        // PET_{name} 덮어쓰기
        const key=PET_PREFIX+(CURRENT.petName||'');
        const payload=JSON.parse(localStorage.getItem(key)||'{}');
        payload.ic=fixed.ic; payload.base=fixed.base;
        localStorage.setItem(key, JSON.stringify(payload));
        el('selInfo').textContent=`IC=${payload.ic}, base=[${payload.base.join(' / ')}], E=${payload.E}`;
        el('fixBox').innerHTML='<span class="warn">저장 완료. 이후 이 값으로 계산합니다.</span>';
      };
    }else{
      el('fixBox').innerHTML='<span class="warn">이 계수세트로는 해당 초기치를 만들 수 없습니다. StageA의 계수 추정을 재검토하세요.</span>';
    }
  }

  const t1=performance.now();
  let pText='0.0000%';
  if(total>0){ pText=((halluc/total)*100).toFixed(4)+'%'; el('outSub').textContent=`일치 ${total}건 중 환각 ${halluc}건 · (IC=${used.ic}, base=[${used.base.join(' / ')}]) · ${(t1-t0).toFixed(0)}ms`; }
  else       { el('outSub').textContent='일치 케이스 0건'; }
  el('outHead').textContent=`성공 확률 : ${pText}`;
};

/* 초기화 */
(function init(){
  // 초성, 목록, 최근
  buildIndex();
})();
</script>
</body>
</html>
