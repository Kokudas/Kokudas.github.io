<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>StageB · Lv140 환각(S) 확률</title>
<style>
  :root{--bg:#0f172a;--panel:#111827;--ink:#e5e7eb;--mut:#94a3b8;--acc:#60a5fa;--warn:#f43f5e;--ok:#22c55e}
  *{box-sizing:border-box;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto}
  body{margin:0;background:#0b1220;color:var(--ink)}
  nav{display:flex;gap:12px;align-items:center;padding:12px 16px;background:#0a1020;border-bottom:1px solid #1f2937;position:sticky;top:0;z-index:2}
  nav a{color:#c7d2fe;text-decoration:none;font-weight:600}
  nav a:hover{text-decoration:underline}
  #banner{margin-left:auto;color:#a8b2d1}
  main{max-width:1000px;margin:24px auto;padding:0 16px}
  .card{background:linear-gradient(180deg,#0b1220,#0c1426 60%);border:1px solid #1f2937;border-radius:14px;padding:16px;margin-bottom:16px}
  h1{margin:6px 0 10px 0}
  h2{margin:0 0 10px 0;font-size:18px;border-left:4px solid var(--acc);padding-left:10px}
  label{display:block;margin:10px 0 6px 0;color:#cbd5e1;font-weight:600}
  input,select{width:100%;padding:10px;border-radius:10px;border:1px solid #334155;background:#0a1220;color:#e5e7eb}
  .row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
  .row3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
  .btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .btn{padding:10px 14px;border:1px solid #334155;border-radius:10px;background:#0d1b31;color:#e5e7eb;cursor:pointer}
  .btn:hover{background:#0f2140}
  .btn.alt{background:#0b1328;border-color:#3b82f6}
  .btn.alt:hover{background:#0c1a36}
  .btn.warn{background:#2a0b12;border-color:#f43f5e}
  .mut{color:#9aa7bd;font-size:13px}
  table{width:100%;border-collapse:collapse;margin-top:12px}
  th,td{border-bottom:1px solid #1f2937;padding:8px;text-align:right}
  th{color:#9fb1d4}
  td.name,th.name{text-align:left}
</style>
</head>
<body>
<nav>
  <a href="https://kokudas.github.io/">홈</a>
  <span style="opacity:.6">|</span>
  <a href="./stageA.html">단계A(역산)</a>
  <span style="opacity:.6">|</span>
  <a href="./stageB.html">단계B(S확률)</a>
  <span id="banner">Ready</span>
</nav>

<main>
  <div class="card">
    <h1>단계B · Lv140 환각(S) 확률</h1>
    <div class="mut">StageA에서 전송된 후보로 1→140레벨 성장 난수를 시뮬레이션(몬테카를로)합니다.</div>
  </div>

  <div class="card">
    <h2>입력</h2>
    <div class="row3">
      <div>
        <label>소스(전달된 후보)</label>
        <div>이름: <b id="srcName">(없음)</b></div>
        <div>성장: <b id="srcGrow">(없음)</b></div>
        <div>후보: <b id="srcCount">0</b>건</div>
      </div>
      <div>
        <label>표기 초기 정수 (체,공,방,순)</label>
        <input id="i_ints" placeholder="예: 52,12,7,6">
        <div class="mut">비우면 정수필터 미적용</div>
        <div class="mut">정수필터 모드:
          <select id="preMode">
            <option value="fast" selected>빠름(샘플)</option>
            <option value="normal">보통</option>
            <option value="strong">강함(느림)</option>
          </select>
        </div>
      </div>
      <div>
        <label>라운딩</label>
        <select id="initRound">
          <option value="floor" selected>내림</option>
          <option value="round">반올림</option>
          <option value="ceil">올림</option>
        </select>
      </div>
    </div>

    <div class="row3">
      <div><label>시뮬레이션 횟수</label><input id="nTrials" type="number" value="3000" min="500" step="500"></div>
      <div><label>레벨 상한</label><input id="lvCap" type="number" value="140" min="2" max="200"></div>
      <div><label>성장 비교 오차(평균/레벨)</label>
        <select id="growTol">
          <option value="0.010">±0.010</option>
          <option value="0.015">±0.015</option>
          <option value="0.020" selected>±0.020</option>
          <option value="0.030">±0.030</option>
        </select>
      </div>
    </div>

    <div class="btns">
      <button class="btn alt" id="btnLoadLS">localStorage 불러오기</button>
      <button class="btn" id="btnLoadJSON">JSON 불러오기(디버그)</button>
      <button class="btn warn" id="btnReset">후보 초기화</button>
      <button class="btn alt" id="btnCalc">확률 계산</button>
      <span class="mut" id="stat"></span>
    </div>
  </div>

  <div class="card">
    <h2>결과</h2>
    <div class="mut" id="summary">—</div>
    <table id="tbl">
      <thead>
        <tr>
          <th class="name"># / Rank</th>
          <th>initnum</th>
          <th>p(S|cand)</th>
          <th>비고</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="card">
    <h2>주의/안내</h2>
    <ul class="mut">
      <li>몬테카를로는 난수 기반이라 매 실행 시 값이 약간 변동될 수 있습니다.</li>
      <li>정수필터를 너무 강하게 걸면 후보가 모두 걸러질 수 있습니다.</li>
    </ul>
  </div>
</main>

<script>
// ===== 공통 행렬/유틸 =====
const M=[[4,1,1,1],[0.1,1,0.1,0.05],[0.1,0.1,1,0.05],[0,0,0,1]];
function matInv4(){return[
  [ 0.2619047619047619,-0.2380952380952381,-0.2380952380952381,-0.2380952380952381],
  [-0.0238095238095238, 1.0317460317460319,-0.0793650793650794,-0.0238095238095238],
  [-0.0238095238095238,-0.0793650793650794, 1.0317460317460319,-0.0238095238095238],
  [ 0,0,0,1]
];}
const Minv=matInv4();
const rankB={R1:[450,500],R2:[470,520],R3:[490,540],R4:[510,560],R5:[530,580],R6:[550,600]};
function dot4(A,v){return[
  A[0][0]*v[0]+A[0][1]*v[1]+A[0][2]*v[2]+A[0][3]*v[3],
  A[1][0]*v[0]+A[1][1]*v[1]+A[1][2]*v[2]+A[1][3]*v[3],
  A[2][0]*v[0]+A[2][1]*v[1]+A[2][2]*v[2]+A[2][3]*v[3],
  A[3][0]*v[0]+A[3][1]*v[1]+A[3][2]*v[2]+A[3][3]*v[3],
];}
function approx(a,b,t){return Math.abs(a-b)<=t;}
function applyRound(x,mode){ if(mode==='floor') return Math.floor(x); if(mode==='ceil') return Math.ceil(x); return Math.round(x); }

// 정수필터 최적화 (StageA와 동일)
const BASE_PATTERNS=[
  [3,3,2,2],[4,3,2,1],[4,2,2,2],[6,2,1,1],[5,3,1,1],
  [10,0,0,0],[0,10,0,0],[0,0,10,0],[0,0,0,10],
  [5,5,0,0],[0,5,5,0],[0,0,5,5],[4,4,1,1]
];
let PERM_CACHE=null;
function permsUnique(arr){
  const out=new Set();
  const used=Array(arr.length).fill(false);
  const nums=arr.slice().sort((a,b)=>a-b);
  const cur=[];
  function dfs(){
    if(cur.length===nums.length){ out.add(cur.join(',')); return; }
    for(let i=0;i<nums.length;i++){
      if(used[i]) continue;
      if(i>0 && nums[i]===nums[i-1] && !used[i-1]) continue;
      used[i]=true; cur.push(nums[i]); dfs(); cur.pop(); used[i]=false;
    }
  }
  dfs();
  return Array.from(out).map(s=>s.split(',').map(Number));
}
function buildPermCache(){ if(PERM_CACHE) return PERM_CACHE; PERM_CACHE=BASE_PATTERNS.flatMap(permsUnique); return PERM_CACHE; }
function randInt(a,b){return a+Math.floor(Math.random()*(b-a+1));}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function canMakeInitialInts(baseS, initnum, ints, roundMode, mode='fast'){
  if(!ints) return true;
  const base = baseS.map(v=>v-4.5);
  const tryOnce=(rH,rA,rD,rG,b)=>{
    const h=initnum*(base[0]+rH+b[0])/100;
    const a=initnum*(base[1]+rA+b[1])/100;
    const d=initnum*(base[2]+rD+b[2])/100;
    const g=initnum*(base[3]+rG+b[3])/100;
    const H=applyRound(h*4+a+d+g,roundMode);
    const A=applyRound(h*0.1+a+d*0.1+g*0.05,roundMode);
    const D=applyRound(h*0.1+a*0.1+d+g*0.05,roundMode);
    const G=applyRound(g,roundMode);
    return (H===ints[0] && A===ints[1] && D===ints[2] && G===ints[3]);
  };
  if(mode==='fast'){
    for(let t=0;t<200;t++){
      const rH=randInt(-2,2), rA=randInt(-2,2), rD=randInt(-2,2), rG=randInt(-2,2);
      const bp=pick(permsUnique(pick(BASE_PATTERNS)));
      if(tryOnce(rH,rA,rD,rG,bp)) return true;
    }
    return false;
  }else if(mode==='normal'){
    const ALL=buildPermCache();
    for(let t=0;t<150;t++){
      const rH=randInt(-2,2), rA=randInt(-2,2), rD=randInt(-2,2), rG=randInt(-2,2);
      const bp=pick(ALL);
      if(tryOnce(rH,rA,rD,rG,bp)) return true;
    }
    return false;
  }else{
    const ALL=buildPermCache();
    for(let rH=-2;rH<=2;rH++){
      for(let rA=-2;rA<=2;rA++){
        for(let rD=-2;rD<=2;rD++){
          for(let rG=-2;rG<=2;rG++){
            for(const bp of ALL){ if(tryOnce(rH,rA,rD,rG,bp)) return true; }
          }
        }
      }
    }
    return false;
  }
}

// 상태
let state={petName:'',targetGrow:[null,null,null,null],initRound:'floor',candidates:[]};
const srcName=document.getElementById('srcName');
const srcGrow=document.getElementById('srcGrow');
const srcCount=document.getElementById('srcCount');
const tblBody=document.querySelector('#tbl tbody');
const statEl=document.getElementById('stat');
const summary=document.getElementById('summary');

function loadLS(){
  const raw=localStorage.getItem('kokudas:candidates');
  if(!raw) return false;
  try{
    const obj=JSON.parse(raw);
    state={
      petName:obj.petName||'', targetGrow:obj.targetGrow||[null,null,null,null],
      initRound:obj.initRound||'floor', candidates:Array.isArray(obj.candidates)?obj.candidates:[]
    };
    srcName.textContent = state.petName||'(없음)';
    srcGrow.textContent = state.targetGrow.map(x=> (typeof x==='number'?x.toFixed(2):x)).join(', ');
    srcCount.textContent= state.candidates.length;
    document.getElementById('initRound').value=state.initRound;
    return true;
  }catch{ return false; }
}
document.getElementById('btnLoadLS').addEventListener('click',()=>{ if(loadLS()) alert('불러왔습니다.'); else alert('저장된 후보가 없습니다.'); });
document.getElementById('btnLoadJSON').addEventListener('click',()=>{
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.json,application/json';
  inp.onchange=async e=>{
    const f=e.target.files[0]; if(!f) return;
    const text=await f.text();
    try{
      const obj=JSON.parse(text);
      state={petName:obj.petName||'',targetGrow:obj.targetGrow||[null,null,null,null],initRound:obj.initRound||'floor',candidates:Array.isArray(obj.candidates)?obj.candidates:[]};
      srcName.textContent=state.petName||'(없음)'; srcGrow.textContent=state.targetGrow.map(x=>(typeof x==='number'?x.toFixed(2):x)).join(', '); srcCount.textContent=state.candidates.length;
      document.getElementById('initRound').value=state.initRound;
      alert('JSON 로드 완료');
    }catch{ alert('JSON 파싱 실패'); }
  };
  inp.click();
});
document.getElementById('btnReset').addEventListener('click',()=>{
  localStorage.removeItem('kokudas:candidates');
  state={petName:'',targetGrow:[null,null,null,null],initRound:'floor',candidates:[]};
  srcName.textContent='(없음)'; srcGrow.textContent='(없음)'; srcCount.textContent='0';
  tblBody.innerHTML=''; summary.textContent='—';
  alert('초기화했습니다.');
});

// A 분배
function sampleA(){ const A=[0,0,0,0]; for(let k=0;k<10;k++){ A[Math.floor(Math.random()*4)]++; } return A; }

document.getElementById('btnCalc').addEventListener('click', async ()=>{
  try{
    tblBody.innerHTML=''; summary.textContent='—';
    if(!state.candidates.length){ alert('먼저 StageA에서 후보를 전송하세요.'); return; }

    const growTarget=state.targetGrow;
    if(growTarget.some(x=>typeof x!=='number')){ alert('타겟 성장치가 유효하지 않습니다.'); return; }

    const s=document.getElementById('i_ints').value.trim();
    const ints = s? s.split(',').map(x=>parseInt(x.trim(),10)) : null;
    if(s && (ints.length!==4 || ints.some(Number.isNaN))){ alert('정수는 "체,공,방,순" 형식'); return; }

    const preMode=document.getElementById('preMode').value;
    const roundMode=document.getElementById('initRound').value;
    const trials=Math.max(500, parseInt(document.getElementById('nTrials').value,10)||3000);
    const lvCap=Math.min(200, Math.max(2, parseInt(document.getElementById('lvCap').value,10)||140));
    const tol=parseFloat(document.getElementById('growTol').value);
    const lvSteps=lvCap-1;

    statEl.textContent='계산 중...';
    await new Promise(r=>setTimeout(r,10));

    const rows=[]; const ps=[];
    for(let i=0;i<state.candidates.length;i++){
      const cand=state.candidates[i];

      // 정수필터
      let intOK=true;
      if(ints) intOK = canMakeInitialInts(cand.base, cand.initnum, ints, roundMode, preMode);
      if(!intOK){
        rows.push({cand,p:0,msg:'초기정수 불가'}); ps.push(0);
        const tr=document.createElement('tr');
        tr.innerHTML=`<td class="name">${i+1}. <b>${cand.rank}</b></td><td>${cand.initnum}</td><td>0.000%</td><td>초기정수 불가</td>`;
        tblBody.appendChild(tr);
        continue;
      }

      const [Bmin,Bmax]=rankB[cand.rank];
      const baseForGrowth=cand.base.map(v=>v-2.5);
      let succ=0;

      for(let t=0;t<trials;t++){
        let sum=[0,0,0,0];
        for(let lv=2;lv<=lvCap;lv++){
          const B=Bmin+Math.random()*(Bmax-Bmin);
          const A=sampleA();
          const up=baseForGrowth.map((v,k)=> ((v + A[k]) * B) / 10000 );
          const disp=dot4(M, up);
          sum[0]+=disp[0]; sum[1]+=disp[1]; sum[2]+=disp[2]; sum[3]+=disp[3];
        }
        const avg=sum.map(x=>x/lvSteps);
        if(avg.every((v,j)=> v+1e-9 >= (growTarget[j]-tol))) succ++;
      }
      const p=succ/trials; rows.push({cand,p,msg:''}); ps.push(p);

      const tr=document.createElement('tr');
      tr.innerHTML=`<td class="name">${i+1}. <b>${cand.rank}</b></td><td>${cand.initnum}</td><td>${(p*100).toFixed(3)}%</td><td></td>`;
      tblBody.appendChild(tr);
      if(i%10===0) await new Promise(r=>setTimeout(r,0));
    }

    const mean=ps.reduce((a,b)=>a+b,0)/ps.length, mn=Math.min(...ps), mx=Math.max(...ps);
    summary.innerHTML=`후보 ${ps.length}건 · 평균 p(Lv${lvCap}) <b>${(mean*100).toFixed(3)}%</b> · 범위 <b>${(mn*100).toFixed(3)}%</b> ~ <b>${(mx*100).toFixed(3)}%</b>`;
    statEl.textContent='완료';
  }catch(err){
    console.error(err);
    alert('계산 중 오류가 발생했습니다.');
    statEl.textContent='오류';
  }
});

// 자동 로드
window.addEventListener('DOMContentLoaded',()=>{ loadLS(); });
</script>
</body>
</html>
