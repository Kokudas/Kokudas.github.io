<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>StageB v0.2 · 성공 확률</title>
<style>
:root{--bg:#0b1220;--card:#111a2b;--muted:#8aa0bd;--pri:#7aa2ff;--ok:#19c37d}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#0b1220,#0e1729);font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,"Noto Sans KR",Pretendard,sans-serif;color:#e7eef8}
header{position:sticky;top:0;z-index:10;background:rgba(11,18,32,.8);backdrop-filter:blur(6px);border-bottom:1px solid #1e2a44}
header .wrap{display:flex;align-items:center;gap:12px;max-width:1100px;margin:0 auto;padding:12px 16px}
header a{color:var(--pri);text-decoration:none;font-weight:600}
.pill{padding:6px 10px;border:1px solid #2a3a5e;border-radius:999px;background:#0e1628;color:#cfe0ff}
main{max-width:1100px;margin:24px auto;padding:0 16px;display:grid;grid-template-columns:1fr}
.card{background:var(--card);border:1px solid #1a2540;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.25);margin-bottom:16px}
.card h2{margin:0;padding:14px 16px;border-bottom:1px solid #1e2a44;font-size:18px;color:#d8e6ff}
.card .body{padding:16px}
.row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media (max-width:860px){.row{grid-template-columns:1fr}}
label{font-size:12px;color:var(--muted);display:block;margin-bottom:6px}
input,select,button{width:100%;padding:10px 12px;border-radius:10px;border:1px solid #253250;background:#0d1526;color:#e7eef8}
button{cursor:pointer;font-weight:700}
.btn{background:#132347;border-color:#2a3a5e}
.btn:hover{background:#162a55}
.big{font-size:28px;font-weight:800}
.muted{color:var(--muted);font-size:13px}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #1e2a44;font-size:13px}
th{color:#bcd1ff}
.fold{margin-top:10px}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <strong>StageB v0.2 · 성공 확률</strong>
    <a class="pill" href="./index.html">📖 Index</a>
    <a class="pill" href="./stageA.html">⬅️ StageA</a>
  </div>
</header>

<main>
  <section class="card">
    <h2>선택 & 입력</h2>
    <div class="body">
      <div class="row">
        <div>
          <label>로컬 저장 후보 선택</label>
          <select id="petSelect"></select>
        </div>
        <div>
          <label>정수 초기치 [H/A/D/G]</label>
          <input id="intInit" placeholder="예: 55,11,9,5"/>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn" id="btnCalc">계산 시작</button>
          <button class="btn" id="btnReset">StageA 값 초기화</button>
        </div>
      </div>
      <div class="muted" style="margin-top:8px">
        ※ 표시 방식: <b>Floor</b>(버림) 기준 권장. <br/>
        ※ “성공 확률”은 평균 <b>p(S|Int)</b>입니다(정수 초기치가 딱 지금 값일 때 S 달성 확률).
      </div>
    </div>
  </section>

  <section class="card">
    <h2>결과</h2>
    <div class="body">
      <div id="mainResult" class="big">성공 확률 : –</div>
      <div class="muted" id="aux"></div>

      <details class="fold">
        <summary>디버그 표 보기(선택)</summary>
        <div style="overflow:auto;max-height:55vh;border:1px solid #1e2a44;border-radius:10px;margin-top:8px">
          <table id="tbl"><thead><tr>
            <th>#</th><th>일치?</th><th>랭크</th><th>initnum</th><th>baseS</th><th>p(Int|cand)</th><th>p(S|cand,Int)</th><th>p(S|cand)</th>
          </tr></thead><tbody></tbody></table>
        </div>
      </details>
    </div>
  </section>
</main>

<script>
// ----- 로딩 -----
function loadKeys(){
  const keys=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k && k.startsWith('sa_candidates::')) keys.push(k);
  }
  return keys.sort();
}
const sel=document.getElementById('petSelect');
function refreshSelect(){
  sel.innerHTML='';
  const keys=loadKeys();
  if(!keys.length){ const o=document.createElement('option'); o.text='(로컬 저장 없음)'; o.value=''; sel.appendChild(o); return; }
  keys.forEach(k=>{
    const o=document.createElement('option');
    const name=k.split('::')[1]||k;
    o.text = name;
    o.value = k;
    sel.appendChild(o);
  });
}
refreshSelect();

// ----- 모델 가정(간소) -----
const Aavg=2.5;
function dispFromRaw(h,a,d,g){
  return [h*4+a+d+g, h*0.1+a+d*0.1+g*0.05, h*0.1+a*0.1+d+g*0.05, g];
}
// 1레벨 정수 초기치 생성 가능 여부(간단 필터)
function canMakeInt(initnum, baseS, intHADG){
  // 표시식 계산 후 floor
  const h=(initnum*(baseS[0]+Aavg))/100;
  const a=(initnum*(baseS[1]+Aavg))/100;
  const d=(initnum*(baseS[2]+Aavg))/100;
  const g=(initnum*(baseS[3]+Aavg))/100;
  const disp=dispFromRaw(h,a,d,g).map(x=>Math.floor(x));
  return (disp[0]===intHADG[0] && disp[1]===intHADG[1] && disp[2]===intHADG[2] && disp[3]===intHADG[3]);
}

// 성장 시뮬(요약형; 내부 난수/보너스 분배는 표기식 역으로 근사)
// ※ 병목 줄이기 위해 샘플 수 기본 10,000으로 축소 가능(성능 옵션)
async function estimate_S_given_Int(payload, intHADG, trials=12000, lvMax=140){
  const candList=payload.candidates||[];
  if(!candList.length) return {meanInt:0, meanSgivenInt:0, meanS:0, rows:[]};
  const rows=[];
  let wSum=0, pIntSum=0, pSgISum=0, pSSum=0;

  // S컷(누적표기) — 사용자가 쓰던 값(샴기르 스타일)에 맞게 대략 고정
  const S_cut=[1385.83,334.99,198.77,168.19];

  for(let i=0;i<candList.length;i++){
    const c=candList[i];
    const base=c.base; const initnum=c.initnum;
    // 1) p(Int|cand) — 간단화를 위해 {0,ε}로 둘게요: 만들 수 있으면 ε=1, 아니면 0
    const ok = canMakeInt(initnum, base, intHADG);
    const pInt = ok ? 1 : 0;

    // 2) p(S|cand,Int) — (빠른 근사) 성장합이 컷을 넘길 확률을 난수로 근사
    //    성능: 6~12k 샘플에서 수렴. 더 빠르게 하고 싶으면 trials를 줄이세요.
    let hit=0;
    if(ok){
      for(let t=0;t<trials;t++){
        // 난수 근사: 레벨마다 평균 성장값 ±편차(노이즈) 누적
        // 과대추정 방지: 정규노이즈 표준편차를 stat별로 5~8%로 제한
        const sd=[0.08,0.07,0.07,0.06]; // H/A/D/G
        const meanGrow = payload.targetGrow||[10,2.4,1.4,1.2];
        const sum=[0,0,0,0];
        for(let lv=2; lv<=lvMax; lv++){
          for(let s=0;s<4;s++){
            // Box–Muller
            const u=Math.random()||1e-9, v=Math.random()||1e-9;
            const z=Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
            const g = meanGrow[s]*(1 + sd[s]*z);
            sum[s]+=g;
          }
        }
        // 1레벨 정수 초기치를 합산하여 누적표기 근사
        const tot=[intHADG[0]+sum[0], intHADG[1]+sum[1], intHADG[2]+sum[2], intHADG[3]+sum[3]];
        if(tot[0]>=S_cut[0] && tot[1]>=S_cut[1] && tot[2]>=S_cut[2] && tot[3]>=S_cut[3]) hit++;
      }
    }
    const pSgI = ok ? (hit/trials) : 0;
    const pS    = pInt * pSgI;

    rows.push({i:i+1, ok, rank:c.rank, initnum, base, pInt, pSgI, pS});
    wSum++;
    pIntSum += pInt;
    pSgISum += pSgI;
    pSSum   += pS;
  }

  return {
    meanInt: pIntSum/wSum,
    meanSgivenInt: pSgISum/wSum,
    meanS: pSSum/wSum,
    rows
  };
}

// ----- UI -----
const tbl=document.getElementById('tbl').querySelector('tbody');
const mainResult=document.getElementById('mainResult');
const aux=document.getElementById('aux');

function setMainResult(p){
  mainResult.textContent = `성공 확률 : ${ (p*100).toFixed(3) }%`;
}

function renderRows(rows){
  tbl.innerHTML='';
  rows.forEach(r=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td>${r.i}</td>
      <td>${r.ok?'✓':''}</td>
      <td>${r.rank}</td>
      <td>${r.initnum}</td>
      <td>[${r.base.map(v=>v.toFixed(3)).join(' / ')}]</td>
      <td>${(r.pInt*100).toFixed(3)}%</td>
      <td>${(r.pSgI*100).toFixed(3)}%</td>
      <td>${(r.pS*100).toFixed(3)}%</td>
    `;
    tbl.appendChild(tr);
  });
}

document.getElementById('btnCalc').addEventListener('click', async ()=>{
  const key=sel.value;
  if(!key){ alert('StageA에서 로컬 저장을 먼저 해주세요.'); return; }
  const payload = JSON.parse(localStorage.getItem(key)||'{}');
  const iv = (document.getElementById('intInit').value||'').split(',').map(s=>parseInt(s.trim(),10));
  if(iv.length!==4 || iv.some(isNaN)){ alert('정수 초기치를 "H,A,D,G" 형태로 입력하세요. 예: 55,11,9,5'); return; }

  mainResult.textContent='계산 중...';
  aux.textContent='샘플링 중(기본 12,000회)…';

  const out = await estimate_S_given_Int(payload, iv, 12000, 140);
  setMainResult(out.meanSgivenInt);
  aux.textContent = `${(out.rows.length||0)}개 후보 평균 · p(Int)=${(out.meanInt*100).toFixed(3)}% · p(S|Int)=${(out.meanSgivenInt*100).toFixed(3)}% · p(S)=${(out.meanS*100).toFixed(3)}%`;
  renderRows(out.rows);

  if(out.meanSgivenInt===0){
    aux.textContent += '  · 참고: 모든 후보가 입력한 정수 초기치를 만들 수 없다고 판정될 때 0%가 됩니다. (StageA 입력 또는 라운딩/Floor 확인)';
  }
});

document.getElementById('btnReset').addEventListener('click', ()=>{
  const keys=[]; for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i); if(k.startsWith('sa_candidates::')) keys.push(k);}
  keys.forEach(k=>localStorage.removeItem(k));
  refreshSelect(); alert('StageA 값 초기화 완료');
});
</script>
</body>
</html>
