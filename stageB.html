<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>StageB · 환각 확률 계산 (floor, 단일 계수)</title>
<style>
:root{--bg:#081120;--card:#0f1930;--ink:#e9f1ff;--muted:#a7b3d1;--pri:#6aa6ff;--ok:#4ade80;--chip:#1b2740}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#081120,#0b1220);color:var(--ink);font:16px/1.55 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,Arial}
.wrap{max-width:1180px;margin:28px auto;padding:0 16px}
h1{margin:0 0 8px;font-size:22px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 14px}
.chip{background:var(--chip);border:1px solid #233055;border-radius:999px;padding:6px 10px;color:#9fb2e7;font-weight:800}
.row{display:grid;grid-template-columns:320px 1fr;gap:16px}
@media(max-width:980px){.row{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid #1c2844;border-radius:16px;padding:16px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
label{display:block;color:var(--muted);font-weight:800;margin-bottom:6px}
input,button{width:100%;padding:16px;border-radius:12px;border:1px solid #243251;background:#0e1729;color:var(--ink);font-size:18px}
button{cursor:pointer;font-weight:900;background:var(--pri);border:none;color:#061022}
button.ghost{background:#102246;color:var(--ink);border:1px solid #243251}
.kbdbar{display:grid;grid-template-columns:repeat(10,1fr);gap:6px}
.kbdbar button{padding:10px;border-radius:10px;background:#14254a;color:#cfe0ff;border:1px solid #243251;cursor:pointer}
.side{display:grid;gap:10px}
.small{font-size:13px;color:var(--muted)}
.list{border:1px solid #243251;border-radius:12px;max-height:40vh;overflow:auto}
.item{padding:10px 12px;border-bottom:1px solid #1b2746;cursor:pointer}
.item:hover{background:#122147}
.pill{display:inline-block;padding:6px 10px;border-radius:999px;background:#102246;border:1px solid #243251;color:#9fb2e7;font-weight:800}
.big{font-size:30px;font-weight:900}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.help{font-size:14px;color:#a7b3d1;margin-top:4px}
</style>
</head>
<body>
<div class="wrap">
  <h1>StageB · 환각 확률 계산</h1>
  <div class="chips">
    <span class="chip">표기 라운딩: floor</span>
    <span class="chip">환각(= +2,+2,+2,+2) 확률만 표시</span>
    <span class="chip">단일 계수 세트(짜얄 개선식)</span>
  </div>

  <div class="row">
    <!-- 왼쪽: 초성 키패드 + 옆 소목록 + 최근 선택 -->
    <div class="side">
      <div class="card">
        <label>초성 선택</label>
        <div class="kbdbar" id="kbd"></div>
        <div class="small">자음을 클릭하면, 해당 초성으로 시작하는 페트 목록이 아래에 나타납니다.</div>
      </div>
      <div class="card">
        <label>목록</label>
        <div id="pickList" class="list"></div>
      </div>
      <div class="card">
        <label>최근 선택</label>
        <div id="recentList" class="list"></div>
      </div>
      <div class="card">
        <button class="ghost" id="btnReset">디버그: 저장 리셋</button>
        <div class="small">관리자(StageA)에서 저장한 데이터만 사용합니다. JSON은 더이상 사용하지 않습니다.</div>
      </div>
    </div>

    <!-- 오른쪽: 입력 4칸 + 결과 한 줄 -->
    <div>
      <div class="card">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <div><span class="pill">선택된 페트</span></div>
          <div id="selInfo" class="pill">—</div>
        </div>

        <div style="margin-top:12px">
          <label>정수 표기 초기치(1레벨)</label>
          <div class="grid4">
            <div>
              <input id="intHP" type="number" inputmode="numeric" placeholder="체력(HP)">
              <div class="help">예: 52</div>
            </div>
            <div>
              <input id="intATK" type="number" inputmode="numeric" placeholder="공격력(ATK)">
              <div class="help">예: 12</div>
            </div>
            <div>
              <input id="intDEF" type="number" inputmode="numeric" placeholder="방어력(DEF)">
              <div class="help">예: 7</div>
            </div>
            <div>
              <input id="intAGI" type="number" inputmode="numeric" placeholder="순발력(AGI)">
              <div class="help">예: 6</div>
            </div>
          </div>
        </div>

        <div style="margin-top:12px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:end">
          <div class="small">표는 없습니다. 단일 계수로 정확 열거하여 환각 확률만 계산합니다.</div>
          <button id="run">계산</button>
        </div>

        <div style="margin-top:12px" class="big" id="headline">성공 확률 : —</div>
        <div class="small" id="subline"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ==== 공통/DB ====
const DBKEY='PetDBRecords';
function loadDB(){try{const db=JSON.parse(localStorage.getItem(DBKEY)||'[]'); return Array.isArray(db)?db:[];}catch{return []}}
function saveRecent(name){
  const K='RecentPets'; const L=JSON.parse(localStorage.getItem(K)||'[]').filter(x=>x!==name);
  L.unshift(name); localStorage.setItem(K, JSON.stringify(L.slice(0,15)));
  renderRecent();
}
function renderRecent(){
  const K='RecentPets'; const L=JSON.parse(localStorage.getItem(K)||'[]');
  const box=document.getElementById('recentList'); box.innerHTML='';
  if(L.length===0){ box.innerHTML='<div class="item small">최근 선택 없음</div>'; return; }
  const db=loadDB();
  L.forEach(n=>{
    const rec=db.find(x=>x.petName===n); if(!rec) return;
    const div=document.createElement('div'); div.className='item'; div.textContent=rec.petName;
    div.onclick=()=>choose(rec); box.appendChild(div);
  });
}

// ==== 초성 키패드 + 소목록 ====
const initials=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
function chosung(str){const BASE=0xAC00,LAST=0xD7A3,CHO=["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];let out="";
 for(const ch of str){const c=ch.charCodeAt(0); if(c>=BASE&&c<=LAST){const off=c-BASE; out+=CHO[Math.floor(off/588)];} else out+=ch;} return out;}
function renderInitials(){
  const kb=document.getElementById('kbd'); kb.innerHTML='';
  initials.forEach(ch=>{
    const b=document.createElement('button'); b.textContent=ch;
    b.onclick=()=>renderPick(ch);
    kb.appendChild(b);
  });
}
function renderPick(ch){
  const box=document.getElementById('pickList'); box.innerHTML='';
  const db=loadDB().sort((a,b)=>a.petName.localeCompare(b.petName,'ko'));
  const list=db.filter(x=>chosung(x.petName).startsWith(ch));
  if(list.length===0){ box.innerHTML='<div class="item small">해당 초성의 페트 없음</div>'; return; }
  list.forEach(r=>{
    const div=document.createElement('div'); div.className='item'; div.textContent=r.petName;
    div.onclick=()=>choose(r);
    box.appendChild(div);
  });
}
renderInitials(); renderPick('ㄱ'); renderRecent();

// ==== 선택 & 계산 ====
const selInfo=document.getElementById('selInfo');
let current=null;
function choose(rec){ current=rec; selInfo.textContent=`${rec.petName} · initnum=${rec.initnum} · base=[${rec.base.join(' / ')}]`; saveRecent(rec.petName);}

const AAVG=2.5;
function dispFromRaw(h,a,d,g){return [4*h+a+d+g,0.1*h+a+0.1*d+0.05*g,0.1*h+0.1*a+d+0.05*g,g];}
const partitions=(()=>{const out=[];for(let h=0;h<=10;h++)for(let a=0;a<=10-h;a++)for(let d=0;d<=10-h-a;d++){out.push([h,a,d,10-h-a-d]);}return out})();
const rvals=[-2,-1,0,1,2];

function countOne(coeff, intHADG){
  const {initnum:IC, base:B}=coeff;
  let match=0, hall=0;
  for(const rh of rvals)for(const ra of rvals)for(const rd of rvals)for(const rg of rvals){
    for(const t of partitions){
      const bh=B[0]+rh+t[0], ba=B[1]+ra+t[1], bd=B[2]+rd+t[2], bg=B[3]+rg+t[3];
      const h=IC*(bh+AAVG)/100, a=IC*(ba+AAVG)/100, d=IC*(bd+AAVG)/100, g=IC*(bg+AAVG)/100;
      const vis=dispFromRaw(h,a,d,g).map(Math.floor);
      if(vis[0]===intHADG[0] && vis[1]===intHADG[1] && vis[2]===intHADG[2] && vis[3]===intHADG[3]){
        match++; if(rh===2 && ra===2 && rd===2 && rg===2) hall++;
      }
    }
  }
  return {match, hall, total:286*625};
}

document.getElementById('run').onclick=()=>{
  if(!current){ alert('좌측 초성에서 페트를 선택하세요.'); return; }
  const ints=[+document.getElementById('intHP').value,+document.getElementById('intATK').value,+document.getElementById('intDEF').value,+document.getElementById('intAGI').value];
  if(ints.some(x=>!Number.isFinite(x))){ alert('정수 표기 초기치(체/공/방/순)를 모두 입력하세요.'); return; }

  const {match,hall,total}=countOne(current, ints);
  if(match===0){
    document.getElementById('headline').textContent='성공 확률 : 0.0000%';
    document.getElementById('subline').textContent='해당 초기치를 만들 수 없습니다(조합 불일치).';
    return;
  }
  const p=hall/match; // 조건부 환각 확률
  document.getElementById('headline').textContent=`성공 확률 : ${(p*100).toFixed(4)}%`;
  document.getElementById('subline').textContent=`조건 표본 ${match}건 / 전체 ${total}건 · (+2,+2,+2,+2)=${hall}건`;
};

// 디버그 리셋
document.getElementById('btnReset').onclick=()=>{
  if(confirm('모든 저장 데이터(PetDBRecords/RecentPets)를 지울까요?')){
    localStorage.removeItem('PetDBRecords'); localStorage.removeItem('RecentPets');
    current=null; selInfo.textContent='—'; renderPick('ㄱ'); renderRecent();
  }
};
</script>
</body>
</html>
