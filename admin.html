<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>NOVA PET Admin</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/decimal.js/10.4.3/decimal.min.js"></script>
<style>
  :root{
    --bg:#0f1115; --panel:#161a22; --muted:#8a9099; --accent:#6aa0ff;
    --ok:#35c759; --warn:#ffb300; --bad:#ff5171; --chip:#232a36;
    --ring:#1f2530; --text:#e8ecf3; --highlight:#fff;
  }
  *{box-sizing:border-box}
  body{margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; background:#0f1115; color:#e8ecf3;}
  header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid #232a36;background:#0c1016}
  a{color:#9ec3ff}
  .grid{max-width:1200px;margin:18px auto;padding:0 16px;display:grid;gap:16px;grid-template-columns: 1fr 1fr;}
  @media (max-width: 1080px){ .grid{grid-template-columns:1fr} }
  .card{background:#161a22;border:1px solid #232a36;border-radius:14px;padding:16px}
  .card h3{margin:6px 0 10px 0}
  label{display:block;font-size:12px;color:#8a9099;margin:6px 0 4px 2px}
  input,textarea{width:100%;padding:10px 12px;border-radius:10px;border:1px solid #2a3040;background:#0e1218;color:#e8ecf3;outline:none}
  textarea{min-height:72px;resize:vertical}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  .col{flex:1 1 0}
  .btn{padding:10px 14px;border-radius:10px;border:1px solid #334055;cursor:pointer;background:#142033;color:#cfe1ff;font-weight:600}
  .btn:hover{filter:brightness(1.08)}
  .btn.primary{background:linear-gradient(180deg,#2b71ff,#1d56cc);border-color:transparent;color:#fff}
  .muted{color:#8a9099}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{border-bottom:1px solid #262d3a;padding:8px 6px;text-align:right}
  th:first-child,td:first-child{text-align:left}
  code{background:#0d1117;border:1px solid #2a3040;padding:2px 6px;border-radius:6px}
  .badge{display:inline-block;padding:2px 6px;border-radius:6px;border:1px solid #2a3040;background:#10141c;font-size:11px}
  .ok{color:#35c759} .bad{color:#ff5171}
</style>
</head>
<body>
<header>
  <strong>Admin · NOVA PET 데이터 관리</strong>
  <div class="muted">data/pets.json · GitHub API로 커밋</div>
</header>

<div class="grid">
  <!-- 좌측: 현재 테이블 / 커밋 -->
  <section class="card">
    <h3>① 원격 테이블 불러오기 & 커밋</h3>
    <div class="row">
      <div class="col">
        <label>GitHub Owner / Repo / Branch</label>
        <div class="row">
          <div class="col"><input id="ghOwner" value="kokudas"/></div>
          <div class="col"><input id="ghRepo"  value="kokudas.github.io"/></div>
          <div class="col"><input id="ghBranch" value="main"/></div>
        </div>
      </div>
    </div>
    <div class="row" style="margin-top:8px">
      <div class="col">
        <label>파일 경로</label>
        <input id="ghPath" value="data/pets.json"/>
      </div>
      <div class="col" style="display:flex;align-items:flex-end">
        <button class="btn" id="btnLoad">원격 불러오기</button>
      </div>
    </div>

    <div style="margin-top:10px">
      <div class="muted">현재 로컬 편집본 → <span class="badge" id="countBadge">— 항목</span></div>
      <div style="overflow:auto; max-height:380px; border:1px solid #232a36; border-radius:8px; margin-top:8px">
        <table id="tbl"><thead>
          <tr>
            <th>이름</th>
            <th>S0 (hp/atk/def/agi)</th>
            <th>Sg (hp/atk/def/agi)</th>
            <th>k</th>
            <th>u (hp/atk/def/agi)</th>
          </tr></thead>
          <tbody id="tb"></tbody>
        </table>
      </div>
    </div>

    <details style="margin-top:12px">
      <summary>커밋 설정</summary>
      <div class="row" style="margin-top:8px">
        <div class="col"><label>Personal Access Token (repo 권한)</label><input id="ghToken" type="password" placeholder="ghp_..."/></div>
      </div>
      <div class="row">
        <div class="col"><label>커밋 메시지</label><input id="ghMessage" value="Update pets.json via admin"/></div>
      </div>
      <div class="row" style="margin-top:6px">
        <button class="btn primary" id="btnCommit">커밋(Replace data/pets.json)</button>
        <span class="muted">토큰은 브라우저 메모리에만 잠시 보관(sessionStorage).</span>
      </div>
      <div id="commitLog" class="muted" style="margin-top:8px"></div>
    </details>
  </section>

  <!-- 우측: 신규 추가 / k,u 추정 -->
  <section class="card">
    <h3>② 신규/수정 입력 + k,u 추정</h3>
    <div class="row">
      <div class="col"><label>이름</label><input id="f_name" placeholder="예: 골로스"/></div>
    </div>

    <div class="row">
      <div class="col"><label>S0.hp</label><input id="s0_hp" type="number" step="0.01"></div>
      <div class="col"><label>S0.atk</label><input id="s0_atk" type="number" step="0.01"></div>
      <div class="col"><label>S0.def</label><input id="s0_def" type="number" step="0.01"></div>
      <div class="col"><label>S0.agi</label><input id="s0_agi" type="number" step="0.01"></div>
    </div>

    <div class="row">
      <div class="col"><label>Sg.hp</label><input id="sg_hp" type="number" step="0.01"></div>
      <div class="col"><label>Sg.atk</label><input id="sg_atk" type="number" step="0.01"></div>
      <div class="col"><label>Sg.def</label><input id="sg_def" type="number" step="0.01"></div>
      <div class="col"><label>Sg.agi</label><input id="sg_agi" type="number" step="0.01"></div>
    </div>

    <div class="row" style="margin-top:8px">
      <button class="btn" id="btnInfer">k,u 추정(짜얄식)</button>
      <div class="col" style="display:flex;align-items:center;gap:8px">
        <span class="muted">결과:</span>
        <span id="inferOut" class="badge">—</span>
      </div>
    </div>

    <div class="row" style="margin-top:10px">
      <button class="btn primary" id="btnAdd">테이블에 추가/갱신</button>
      <span class="muted">※ k,u가 유효하게 계산되지 않으면 추가를 막습니다.</span>
    </div>
  </section>
</div>

<script>
/* ========= 공통 상수 ========= */
let GH_OWNER  = "kokudas";
let GH_REPO   = "kokudas.github.io";
let GH_BRANCH = "main";
let GH_PATH   = "data/pets.json";

/* ========= 상태 ========= */
let PETS = {}; // 편집본
let LAST_SHA = null; // 커밋 시 필요
const ESET = [575, 555, 535, 515, 495, 475, 455, 435];

/* ========= 유틸 ========= */
const $ = sel => document.querySelector(sel);
function qv(id){ const el=$("#"+id); const v=parseFloat(el.value); return Number.isFinite(v)? v : NaN; }
function setCount(){ $("#countBadge").textContent = Object.keys(PETS).length + " 항목"; }
function esc(s){ return (s??"").toString(); }
function b64(s){ return btoa(unescape(encodeURIComponent(s))); }
function logCommit(msg){ $("#commitLog").innerHTML += `<div>${esc(msg)}</div>`; }

/* ========= 표 렌더 ========= */
function renderTable(){
  const tb=$("#tb"); tb.innerHTML="";
  const names=Object.keys(PETS).sort((a,b)=>a.localeCompare(b,'ko'));
  names.forEach(n=>{
    const row=PETS[n];
    const s0=row?.s0||{}, sg=row?.sg||{}, u=row?.u||{};
    const tr=document.createElement("tr");
    tr.innerHTML = `
      <td style="text-align:left">${esc(n)}</td>
      <td>${[s0.hp,s0.atk,s0.def,s0.agi].map(v=>v??"").join(" / ")}</td>
      <td>${[sg.hp,sg.atk,sg.def,sg.agi].map(v=>v??"").join(" / ")}</td>
      <td>${row.k??""}</td>
      <td>${[u.hp,u.atk,u.def,u.agi].map(v=>v??"").join(" / ")}</td>
    `;
    tr.addEventListener("click", ()=>{
      // 행 클릭 → 우측 입력 채우기
      $("#f_name").value = n;
      $("#s0_hp").value = s0.hp??""; $("#s0_atk").value=s0.atk??""; $("#s0_def").value=s0.def??""; $("#s0_agi").value=s0.agi??"";
      $("#sg_hp").value = sg.hp??""; $("#sg_atk").value=sx(sg.atk); $("#sg_def").value=sx(sg.def); $("#sg_agi").value=sx(sg.agi);
      $("#inferOut").textContent="—";
      function sx(x){return (x??"");}
    });
    tb.appendChild(tr);
  });
  setCount();
}

/* ========= GitHub 불러오기 ========= */
async function loadRemote(){
  GH_OWNER = $("#ghOwner").value.trim()||GH_OWNER;
  GH_REPO  = $("#ghRepo").value.trim()||GH_REPO;
  GH_BRANCH= $("#ghBranch").value.trim()||GH_BRANCH;
  GH_PATH  = $("#ghPath").value.trim()||GH_PATH;

  const url = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}?ref=${GH_BRANCH}`;
  const res = await fetch(url);
  if(!res.ok){ alert("원격 로드 실패: " + res.status); return; }
  const data = await res.json();
  LAST_SHA = data.sha || null;
  const text = atob(data.content.replace(/\n/g,""));
  try{
    PETS = JSON.parse(text);
  }catch(e){
    alert("JSON 파싱 실패");
    return;
  }
  renderTable();
}

/* ========= GitHub 커밋 ========= */
async function commitRemote(){
  if(!LAST_SHA){ // 혹시 모르니 다시 조회
    await loadRemote();
    if(!LAST_SHA){ alert("원격 파일 정보를 가져올 수 없습니다."); return; }
  }
  const token = $("#ghToken").value.trim();
  if(!token){ alert("GitHub 토큰을 입력하세요."); return; }

  const msg = $("#ghMessage").value.trim() || "Update pets.json via admin";
  const body = {
    message: msg,
    content: b64(JSON.stringify(PETS, null, 2)),
    branch: GH_BRANCH,
    sha: LAST_SHA
  };
  logCommit("커밋 중...");
  const res = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}`,{
    method:"PUT",
    headers:{
      "Authorization": "token " + token,
      "Content-Type": "application/json"
    },
    body: JSON.stringify(body)
  });
  if(!res.ok){
    const txt = await res.text();
    logCommit(`<span class="bad">실패</span> ${res.status} ${esc(txt)}`);
    alert("커밋 실패: " + res.status);
    return;
  }
  const js = await res.json();
  LAST_SHA = js.content?.sha || LAST_SHA;
  logCommit(`<span class="ok">성공</span> ${js.commit?.sha||"(no sha)"}`);
  alert("커밋 완료!");
}

/* ========= 짜얄 호환 k/u 추정 (미세 조정 없음) ========= */
function s0_from_k_u_jjyal(k,u){
  const fac = k/100;
  const vhp  = (u.hp + 2.5) * fac;
  const vatk = (u.atk+ 2.5) * fac;
  const vdef = (u.def+ 2.5) * fac;
  const vagi = (u.agi+ 2.5) * fac;
  const s_hp = Math.floor(vhp*4 + vatk + vdef + vagi);
  const s_atk= Math.floor(vhp*0.1 + vatk + vdef*0.1 + vagi*0.05);
  const s_def= Math.floor(vhp*0.1 + vatk*0.1 + vdef + vagi*0.05);
  const s_agi= Math.floor(vagi);
  return [s_hp,s_atk,s_def,s_agi];
}
function fitKFromS0_JJYAL(S0int,u){
  let best=null;
  for(let k=10;k<=100;k++){
    const s = s0_from_k_u_jjyal(k,u);
    const l1 = Math.abs(s[0]-S0int[0]) + Math.abs(s[1]-S0int[1]) + Math.abs(s[2]-S0int[2]) + Math.abs(s[3]-S0int[3]);
    const ok = (l1===0);
    if(!best || (ok && !best.ok) || (!best.ok && l1<best.l1)) best={k,l1,ok};
    if(ok) break;
  }
  return best;
}
function solveUFromSG_JJYAL(SG, e){
  try{
    if(!SG || ![SG.hp,SG.atk,SG.def,SG.agi].every(Number.isFinite)) return null;
    Decimal.set({ precision:50, rounding: Decimal.ROUND_HALF_UP });

    const eD = new Decimal(e);
    const f  = eD.dividedBy(10000);
    const d  = new Decimal(SG.agi).times(10000).dividedBy(eD).minus(2.5);
    const dRound = d.round();
    const dPlus25 = dRound.plus(2.5);

    const rhs1 = new Decimal(SG.hp).minus( dPlus25.times(f) ).dividedBy(f);
    const rhs2 = new Decimal(SG.atk).minus( dPlus25.times(f).times(0.05) ).dividedBy(f);
    const rhs3 = new Decimal(SG.def).minus( dPlus25.times(f).times(0.05) ).dividedBy(f);

    let A = [
      [ new Decimal(4),   new Decimal(1),   new Decimal(1),   rhs1 ],
      [ new Decimal(0.1), new Decimal(1),   new Decimal(0.1), rhs2 ],
      [ new Decimal(0.1), new Decimal(0.1), new Decimal(1),   rhs3 ],
    ];
    for(let i=0;i<3;i++){
      let mr=i; let mv=A[i][i].abs();
      for(let j=i+1;j<3;j++){ const t=A[j][i].abs(); if(t.greaterThan(mv)){mr=j; mv=t;} }
      if(mr!==i){ const tmp=A[i]; A[i]=A[mr]; A[mr]=tmp; }
      const piv=A[i][i];
      for(let j=i;j<4;j++) A[i][j]=A[i][j].dividedBy(piv);
      for(let k=0;k<3;k++){
        if(k===i) continue;
        const fac=A[k][i];
        for(let j=i;j<4;j++) A[k][j]=A[k][j].minus( fac.times(A[i][j]) );
      }
    }
    const aPrime=A[0][3], bPrime=A[1][3], cPrime=A[2][3];

    const u_hp  = aPrime.minus(2.5).round();
    const u_atk = bPrime.minus(2.5).round();
    const u_def = cPrime.minus(2.5).round();
    const u_agi = dRound;

    const r2 = x => new Decimal(x).toDecimalPlaces(2);
    const hp_chk  = r2( f.times( u_hp.plus(2.5).times(4).plus(u_atk.plus(2.5)).plus(u_def.plus(2.5)).plus(u_agi.plus(2.5)) ) );
    const atk_chk = r2( f.times( u_hp.plus(2.5).times(0.1).plus(u_atk.plus(2.5)).plus(u_def.plus(2.5).times(0.1)).plus(u_agi.plus(2.5).times(0.05)) ) );
    const def_chk = r2( f.times( u_hp.plus(2.5).times(0.1).plus(u_atk.plus(2.5).times(0.1)).plus(u_def.plus(2.5)).plus(u_agi.plus(2.5).times(0.05)) ) );
    const agi_chk = r2( f.times( u_agi.plus(2.5) ) );

    const err = hp_chk.minus(r2(SG.hp)).abs()
               .plus(atk_chk.minus(r2(SG.atk)).abs())
               .plus(def_chk.minus(r2(SG.def)).abs())
               .plus(agi_chk.minus(r2(SG.agi)).abs());

    return { u:{hp:+u_hp, atk:+u_atk, def:+u_def, agi:+u_agi}, e, sg_err:+err };
  }catch(e){ return null; }
}
function inferKU_JJYAL(S0, SG){
  const S0int = S0.map(x=>Math.floor(x));
  let best=null;
  for(const e of ESET){
    const sol = solveUFromSG_JJYAL(SG, e);
    if(!sol) continue;
    const fit = fitKFromS0_JJYAL(S0int, sol.u);
    if(!fit) continue;
    const score = (fit.ok?0:1000) + fit.l1*10 + (sol.sg_err||0);
    const cand = {k:fit.k, u:sol.u, e, sg_err:sol.sg_err, s0_l1:fit.l1, s0_ok:fit.ok, score};
    if(!best || cand.score<best.score) best=cand;
  }
  return best;
}

/* ========= 이벤트 ========= */
$("#btnLoad").addEventListener("click", loadRemote);
$("#btnCommit").addEventListener("click", commitRemote);

$("#btnInfer").addEventListener("click", ()=>{
  const name = $("#f_name").value.trim();
  if(!name){ alert("이름을 입력하세요."); return; }
  const S0 = [qv("s0_hp"), qv("s0_atk"), qv("s0_def"), qv("s0_agi")];
  const SG = { hp:qv("sg_hp"), atk:qv("sg_atk"), def:qv("sg_def"), agi:qv("sg_agi") };
  if(S0.some(x=>!Number.isFinite(x)) || ![SG.hp,SG.atk,SG.def,SG.agi].every(Number.isFinite)){
    alert("S0/SG를 모두 숫자로 입력하세요."); return;
  }
  const fit = inferKU_JJYAL(S0, SG);
  if(!fit){
    $("#inferOut").textContent = "해 불가";
    $("#inferOut").classList.remove("ok");
    $("#inferOut").classList.add("bad");
    alert("현재 입력된 S0/SG로는 계수(k,u)를 산출할 수 없습니다.\nS0/SG 소수점을 소폭 조정해 다시 시도해 주세요.");
    return;
  }
  $("#inferOut").textContent = `k=${fit.k}, u=(${fit.u.hp},${fit.u.atk},${fit.u.def},${fit.u.agi})`;
  $("#inferOut").classList.remove("bad");
  $("#inferOut").classList.add("ok");
});

$("#btnAdd").addEventListener("click", ()=>{
  const name = $("#f_name").value.trim();
  if(!name){ alert("이름을 입력하세요."); return; }

  const s0 = { hp:qv("s0_hp"), atk:qv("s0_atk"), def:qv("s0_def"), agi:qv("s0_agi") };
  const sg = { hp:qv("sg_hp"), atk:qv("sg_atk"), def:qv("sg_def"), agi:qv("sg_agi") };
  if(![s0.hp,s0.atk,s0.def,s0.agi, sg.hp,sg.atk,sg.def,sg.agi].every(Number.isFinite)){
    alert("S0/SG를 모두 숫자로 입력하세요."); return;
  }

  // 저장 전 반드시 k,u 추정 가능해야 함 (미세 조정 없음)
  const fit = inferKU_JJYAL([s0.hp,s0.atk,s0.def,s0.agi], sg);
  if(!fit){
    alert("현재 S0/SG로는 k,u를 산출할 수 없어 저장할 수 없습니다.\nS0/SG 소수점을 소폭 조정한 뒤 'k,u 추정'을 먼저 통과시켜 주세요.");
    return;
  }

  PETS[name] = { s0, sg, k:fit.k, u:fit.u };
  renderTable();
  alert("추가/갱신 완료 (k,u 포함).");
});

/* ========= 초기 ========= */
(async function init(){
  // 기본값 바인딩
  $("#ghOwner").value = GH_OWNER;
  $("#ghRepo").value  = GH_REPO;
  $("#ghBranch").value= GH_BRANCH;
  $("#ghPath").value  = GH_PATH;
  setCount();
})();
</script>
</body>
</html>
