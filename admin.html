<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>노바 서버 페트 Admin</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/decimal.js/10.4.3/decimal.min.js"></script>
<style>
  :root{
    --bg:#0f1115; --panel:#161a22; --muted:#8a9099; --accent:#6aa0ff;
    --ok:#35c759; --warn:#ffb300; --bad:#ff5171; --chip:#232a36;
    --ring:#1f2530; --text:#e8ecf3; --highlight:#fff; --border:#2a3040;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
    background:linear-gradient(180deg,#0f1115 0%,#0c0f14 100%); color:var(--text);
  }
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px; border-bottom:1px solid #232a36; background:rgba(0,0,0,.2);
    position:sticky; top:0; z-index:10;
  }
  .brand{font-weight:700}
  .btn{ padding:9px 12px; border-radius:10px; border:1px solid #334055; cursor:pointer; background:#142033; color:#cfe1ff; font-weight:600; }
  .btn.primary{ background:linear-gradient(180deg,#2b71ff,#1d56cc); border-color:transparent; color:white;}
  .btn.ghost{ background:transparent;}
  .grid{ max-width:1100px; margin:16px auto; padding:0 14px; display:grid; gap:16px; grid-template-columns: 1fr 1fr; }
  @media (max-width: 980px){ .grid{grid-template-columns:1fr} }
  .card{background:var(--panel); border:1px solid #232a36; border-radius:14px; padding:14px; box-shadow:0 6px 24px rgba(0,0,0,.25);}
  .card h3{margin:0 0 10px 0; font-size:16px}
  .row{display:flex; gap:8px; flex-wrap:wrap}
  .col{flex:1 1 0}
  input[type="text"]{
    width:100%; padding:10px 12px; border-radius:10px; border:1px solid var(--border);
    background:#0e1218; color:var(--text); outline:none;
  }
  .muted{color:var(--muted)}
  .list{ max-height:560px; overflow:auto; display:grid; gap:8px; }

  /* ---------- 8확정 리스트: 모바일 줄맞춤 고정용 GRID ---------- */
  .r8-item{
    display:grid;
    grid-template-columns: auto 1fr auto;
    grid-template-areas:
      "cb title tag"
      "cb meta  tag";
    column-gap:10px; row-gap:4px;
    align-items:center;
    padding:10px;
    background:#0d1117; border:1px solid var(--border); border-radius:12px;
    cursor:pointer;
  }
  .r8-item:hover{ background:#141a24 }
  .r8-item input[type="checkbox"]{
    grid-area: cb; width:18px; height:18px; margin:0; accent-color:#2b71ff;
  }
  .r8-title{ grid-area: title; font-weight:700; letter-spacing:.2px }
  .r8-meta{ grid-area: meta; display:flex; gap:6px; flex-wrap:wrap }
  .r8-tag { grid-area: tag; justify-self:end; display:flex; gap:6px; flex-wrap:wrap }
  .tag{
    font-size:11px; border:1px solid #2b3242; border-radius:999px; padding:2px 8px;
    color:#cfd6e3; background:#111826;
  }
  .tag.ok{border-color:#275a34; background:#102214; color:#35c759}
  .tag.warn{border-color:#7a5b0e; background:#241a05; color:#ffb300}
  .tag.rank8{border-color:#2b4a82; background:#0d1a33; color:#88b5ff}
  .pill{ font-size:12px; padding:4px 10px; border:1px solid var(--border); border-radius:999px; background:#10151e}

  /* 모바일에서 세로로 안정적으로 줄바꿈 */
  @media (max-width: 640px){
    .r8-item{
      grid-template-columns: auto 1fr;
      grid-template-areas:
        "cb title"
        "cb meta"
        "cb tag";
      align-items:start;
    }
    .r8-tag{ justify-self:start }
  }

  /* 상단 툴바 */
  .toolbar{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:10px }
  .stat{ display:flex; gap:6px; align-items:center }
</style>
</head>
<body>
<header>
  <div class="brand">ADMIN · NOVA PET</div>
  <div class="row">
    <a class="btn ghost" href="./index.html">← 계산기로</a>
  </div>
</header>

<div class="grid">
  <section class="card">
    <h3>① 데이터 로드</h3>
    <div class="row">
      <div class="col">
        <label class="muted">검색</label>
        <input type="text" id="search" placeholder="펫 이름 검색 (예: 카르곤, 반기노)" />
      </div>
      <button class="btn" id="btnReload">새로고침</button>
    </div>
    <p class="muted" id="loadNote" style="margin:10px 0 0">—</p>
  </section>

  <section class="card">
    <h3>② 8등급(환각) 확정 리스트</h3>
    <div class="toolbar">
      <span class="stat"><span class="pill" id="cntTotal">—</span><span class="muted">총 페트</span></span>
      <span class="stat"><span class="pill" id="cntHasR8">—</span><span class="muted">8확정 보유</span></span>
      <span class="stat"><span class="pill" id="cntChecked">0</span><span class="muted">선택됨</span></span>
    </div>
    <div class="list" id="r8List"></div>
    <p class="muted" style="margin-top:8px">모바일에서도 체크박스/텍스트/태그 줄맞춤이 깨지지 않도록 그리드로 구성했습니다.</p>
  </section>
</div>

<script>
/* ========= 경로 ========= */
const GH_OWNER  = "kokudas";
const GH_REPO   = "kokudas.github.io";
const GH_BRANCH = "main";
const PETS_PATH = "data/pets.json";
const R8_PATHS  = [
  "data/guaranteed_rank8.full.json",
  "data/guaranteed_rank8.min.json",
  "guaranteed_rank8.sample8.json"
];
const REMOTE_PETS = `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/${GH_BRANCH}/${PETS_PATH}`;

const LOCAL_PETS = "data/pets.json";

/* ========= 상태 ========= */
let PETS = {};          // { name: { s0:{}, sg:{}, ... } }
let ALL_NAMES = [];
let R8MAP = {};         // { name: {obs_100_rank8:[[hp,atk,def,agi],...], ...} } 또는 {name:[[...],[...]]} 호환
let FILTER = "";

/* ========= 유틸 ========= */
function fetchJSON(url){
  return fetch(url+`?v=${Date.now()}`,{cache:"no-store"}).then(r=>{ if(!r.ok) throw 0; return r.json();});
}
function sortKoKeys(obj){
  return Object.keys(obj).sort((a,b)=>a.localeCompare(b,'ko'));
}
function getSets(m){
  if(!m) return [];
  return Array.isArray(m.obs_100_rank8)? m.obs_100_rank8 :
         (Array.isArray(m)? m : []);
}
function el(tag, cls, text){
  const x = document.createElement(tag);
  if(cls) x.className = cls;
  if(text!=null) x.textContent = text;
  return x;
}

/* ========= 렌더 ========= */
const r8List = document.getElementById('r8List');
const search = document.getElementById('search');
const loadNote = document.getElementById('loadNote');
const btnReload = document.getElementById('btnReload');

const cntTotal = document.getElementById('cntTotal');
const cntHasR8 = document.getElementById('cntHasR8');
const cntChecked = document.getElementById('cntChecked');

search.addEventListener('input', ()=>{
  FILTER = (search.value||"").trim();
  renderR8List();
});
btnReload.addEventListener('click', init);

function renderR8List(){
  const names = ALL_NAMES.filter(n => !FILTER || n.includes(FILTER));
  r8List.innerHTML = "";

  let checkedCount = 0;
  let hasR8Count = 0;

  names.forEach(name=>{
    const row = PETS[name] || {};
    const r8  = R8MAP[name];
    const sets = getSets(r8);
    if(sets.length) hasR8Count++;

    const item = document.createElement('label');
    item.className = 'r8-item';
    item.setAttribute('tabindex','0');

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.dataset.name = name;

    cb.addEventListener('change', ()=>{
      cntChecked.textContent = String(
        r8List.querySelectorAll('input[type="checkbox"]:checked').length
      );
    });

    const title = el('div','r8-title', name);

    const meta = el('div','r8-meta');
    const tagStatus = el('span','tag ' + (row.s0 && row.sg ? 'ok':'warn'),
                         row.s0 && row.sg ? '등록됨' : '미등록');
    meta.appendChild(tagStatus);

    if(row.override) meta.appendChild(el('span','tag warn','오버라이드'));

    const tagWrap = el('div','r8-tag');
    if(sets.length){
      const t = el('span','tag rank8', `100% · ${sets.length}세트`);
      t.title = sets.slice(0,20).map(a=>`(${a.join(',')})`).join(' · ')
               + (sets.length>20 ? ` … 외 ${sets.length-20}` : '');
      tagWrap.appendChild(t);
    }else{
      tagWrap.appendChild(el('span','tag','—'));
    }

    item.appendChild(cb);
    item.appendChild(title);
    item.appendChild(meta);
    item.appendChild(tagWrap);

    // 항목 전체 클릭으로 체크 토글
    item.addEventListener('click', (e)=>{
      if(e.target === cb) return; // 기본체크 클릭이면 패스
      cb.checked = !cb.checked;
      cb.dispatchEvent(new Event('change'));
    });

    r8List.appendChild(item);

    if(cb.checked) checkedCount++;
  });

  cntTotal.textContent = String(names.length);
  cntHasR8.textContent = String(hasR8Count);
  cntChecked.textContent = String(
    r8List.querySelectorAll('input[type="checkbox"]:checked').length
  );
}

/* ========= 로드 ========= */
async function init(){
  loadNote.textContent = "데이터 불러오는 중…";
  r8List.innerHTML = "";

  // PETS
  try{
    let obj;
    try{
      obj = await fetchJSON(REMOTE_PETS);
    }catch{
      obj = await fetchJSON(LOCAL_PETS);
    }
    if(typeof obj!=="object" || Array.isArray(obj)) throw 0;
    PETS = obj;
  }catch{
    PETS = {};
  }
  ALL_NAMES = sortKoKeys(PETS);

  // R8
  R8MAP = {};
  for(const p of R8_PATHS){
    try{
      const m = await fetchJSON(p);
      if(typeof m==="object" && !Array.isArray(m)){
        R8MAP = m; break;
      }
    }catch{ /* try next */ }
  }

  loadNote.textContent = `로드 완료 · 펫 ${ALL_NAMES.length}종 / 8확정 등록 ${Object.keys(R8MAP).length}종`;
  renderR8List();
}

/* ========= 시작 ========= */
init();
</script>
</body>
</html>
