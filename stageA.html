<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>StageA v0.7 · 짜얄식 계수 저장(→ StageB)</title>
<style>
:root{--bg:#0b1220;--card:#111a2b;--muted:#8aa0bd;--pri:#7aa2ff;--ok:#19c37d;--bad:#ff5c5c}
*{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#0b1220,#0e1729);font:15px/1.5 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;color:#e7eef8}
header{position:sticky;top:0;z-index:10;background:rgba(11,18,32,.8);backdrop-filter:blur(6px);border-bottom:1px solid #1e2a44}
header .wrap{display:flex;gap:12px;align-items:center;max-width:1000px;margin:0 auto;padding:12px 16px}
a{color:var(--pri);text-decoration:none;font-weight:600}
main{max-width:1000px;margin:24px auto;padding:0 16px;display:grid;grid-template-columns:1fr}
.card{background:var(--card);border:1px solid #1a2540;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.25);padding:16px}
h2{margin:0 0 10px 0;font-size:18px;color:#d8e6ff}
label{font-size:12px;color:var(--muted);display:block;margin-bottom:6px}
input,select,button{width:100%;padding:10px 12px;border-radius:10px;border:1px solid #253250;background:#0d1526;color:#e7eef8}
.row{display:grid;grid-template-columns:repeat(12,1fr);gap:10px}
.col-3{grid-column:span 3}.col-4{grid-column:span 4}.col-6{grid-column:span 6}.col-12{grid-column:span 12}
.btn{background:#132347;border-color:#2a3a5e;cursor:pointer;font-weight:800}
.btn:hover{background:#162a55}
.btn-ok{background:var(--ok);border-color:#18a56d;color:#04120d;font-weight:900}
.small{color:var(--muted);font-size:12px}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <strong>StageA v0.7 · 짜얄식 계수 저장</strong>
    <a href="./stageB.html">➡️ StageB로 이동</a>
  </div>
</header>

<main>
  <section class="card">
    <h2>① 짜얄식 계수 입력 (권장)</h2>
    <div class="row">
      <div class="col-6">
        <label>페트 이름</label>
        <input id="petName" placeholder="예: 오가로스, 반기노"/>
      </div>
      <div class="col-6">
        <label>표기 라운딩(해피/샴기르)</label>
        <select id="roundMode">
          <option value="floor" selected>floor (해피 권장)</option>
          <option value="round">round (샴기르)</option>
          <option value="ceil">ceil</option>
        </select>
      </div>
      <div class="col-4">
        <label>초기계수 IC (initnum)</label>
        <input id="ic" type="number" min="10" max="100" placeholder="예: 31"/>
      </div>
      <div class="col-4">
        <label>체 계수 (H)</label>
        <input id="coefH" type="number" placeholder="예: 32"/>
      </div>
      <div class="col-4">
        <label>공 계수 (A)</label>
        <input id="coefA" type="number" placeholder="예: 14"/>
      </div>
      <div class="col-4">
        <label>방 계수 (D)</label>
        <input id="coefD" type="number" placeholder="예: 22"/>
      </div>
      <div class="col-4">
        <label>순 계수 (G)</label>
        <input id="coefG" type="number" placeholder="예: 21"/>
      </div>
      <div class="col-12 small">
        짜얄/샴기르 표에 있는 **IC, 체/공/방/순 계수**를 그대로 넣어 주세요. (정수 권장)
      </div>
    </div>
    <div class="row" style="margin-top:10px">
      <div class="col-4"><button class="btn-ok" id="btnSave">StageB로 저장</button></div>
      <div class="col-4"><button class="btn" id="btnExport">JSON 내보내기</button></div>
      <div class="col-4"><button class="btn" id="btnClear">저장 초기화</button></div>
    </div>
    <div id="note" class="small" style="margin-top:8px">저장 키: <span class="mono" id="lsKey">(미저장)</span></div>
  </section>
</main>

<script>
const $=id=>document.getElementById(id);

function buildPayload(){
  const petName=($('petName').value||'').trim();
  const initRound=$('roundMode').value||'floor';
  const ic=+$('ic').value, H=+$('coefH').value, A=+$('coefA').value, D=+$('coefD').value, G=+$('coefG').value;
  if(!petName||!Number.isFinite(ic)||!Number.isFinite(H)||!Number.isFinite(A)||!Number.isFinite(D)||!Number.isFinite(G)){
    throw new Error('입력을 모두 채워주세요.');
  }
  // StageB가 읽는 새 포맷 (coeff 모드)
  return {
    petName,
    initRound,
    mode: 'coeff',
    coeff: { initnum: ic, base: [H,A,D,G] }
  };
}

$('btnSave').onclick=()=>{
  try{
    const p=buildPayload();
    const key=`StageA_${p.petName}`;
    localStorage.setItem(key, JSON.stringify(p));
    localStorage.setItem('petCalcCandidates', JSON.stringify(p)); // 호환 키
    $('lsKey').textContent=key;
    $('note').innerHTML=`저장 완료 → <span class="mono">${key}</span> · StageB에서 "자동 연결"을 누르세요.`;
    alert('저장되었습니다. StageB에서 불러오세요.');
  }catch(e){ alert(e.message); }
};

$('btnExport').onclick=()=>{
  try{
    const p=buildPayload();
    const blob=new Blob([JSON.stringify(p,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`${p.petName}_coeff.json`; a.click();
  }catch(e){ alert(e.message); }
};

$('btnClear').onclick=()=>{
  const petName=($('petName').value||'').trim();
  if(!petName){ alert('먼저 페트 이름을 입력하세요.'); return; }
  const key=`StageA_${petName}`;
  localStorage.removeItem(key);
  localStorage.removeItem('petCalcCandidates');
  $('lsKey').textContent='(삭제됨)';
  alert('StageA_*, petCalcCandidates 삭제 완료');
};
</script>
</body>
</html>
