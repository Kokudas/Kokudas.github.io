<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>StageA v0.7 · 후보 역산 (→ StageB 연동)</title>
<style>
  :root{--bg:#0b1220;--card:#111a2b;--ink:#e7eef8;--muted:#8aa0bd;--pri:#7aa2ff}
  *{box-sizing:border-box}
  body{margin:0;background:linear-gradient(180deg,#0b1220,#0e1729);color:var(--ink);font:14px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,Helvetica,Arial}
  header{position:sticky;top:0;z-index:10;background:rgba(11,18,32,.8);backdrop-filter:blur(6px);border-bottom:1px solid #1e2a44}
  header .wrap{display:flex;align-items:center;gap:12px;max-width:1100px;margin:0 auto;padding:12px 16px}
  .pill{padding:6px 10px;border:1px solid #2a3a5e;border-radius:999px;background:#0e1628;color:#cfe0ff;text-decoration:none;font-weight:700}
  main{max-width:1100px;margin:24px auto;padding:0 16px;display:grid;grid-template-columns:1.1fr .9fr;gap:18px}
  @media(max-width:980px){main{grid-template-columns:1fr}}
  .card{background:#111a2b;border:1px solid #1a2540;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
  .card h2{margin:0;padding:14px 16px;border-bottom:1px solid #1e2a44;font-size:18px;color:#d8e6ff}
  .card .body{padding:16px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .row3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .row4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  label{font-size:12px;color:var(--muted);display:block;margin-bottom:6px}
  input,select,button{width:100%;padding:10px 12px;border-radius:10px;border:1px solid #253250;background:#0d1526;color:var(--ink)}
  button{cursor:pointer;font-weight:800}
  .btn{background:#132347;border-color:#2a3a5e}
  .btn:hover{background:#162a55}
  .btn-ok{background:#19c37d;border-color:#18a56d;color:#04120d}
  table{width:100%;border-collapse:collapse}
  th,td{padding:10px 8px;border-bottom:1px solid #1e2a44;font-size:13px;text-align:right;white-space:nowrap}
  th{text-align:center;color:#bcd1ff}
  td:nth-child(1),th:nth-child(1){text-align:center}
  .muted{color:var(--muted);font-size:13px}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono","Courier New",monospace}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <strong>StageA v0.7 · 후보 역산</strong>
    <a class="pill" href="./stageB.html">➡️ StageB로 이동</a>
  </div>
</header>

<main>
  <section class="card">
    <h2>입력 · 표기 초기치(소수2자리) + 표기 성장률(소수2자리)</h2>
    <div class="body">
      <div class="row">
        <div>
          <label>페트 이름</label>
          <input id="petName" placeholder="예: 반기노"/>
        </div>
        <div>
          <label>라운딩 규칙</label>
          <select id="initRound">
            <option value="floor">바닥(Floor) – 해피</option>
            <option value="round">반올림(Round) – 샴기르</option>
          </select>
        </div>
      </div>

      <div class="row4" style="margin-top:10px">
        <div><label>표기 초기 · 체</label><input id="initH" type="number" step="0.01" placeholder="예: 52.39"></div>
        <div><label>표기 초기 · 공</label><input id="initA" type="number" step="0.01" placeholder="예: 12.64"></div>
        <div><label>표기 초기 · 방</label><input id="initD" type="number" step="0.01" placeholder="예: 7.49"></div>
        <div><label>표기 초기 · 순</label><input id="initG" type="number" step="0.01" placeholder="예: 6.37"></div>
      </div>

      <div class="row4" style="margin-top:10px">
        <div><label>표기 성장 · 체성</label><input id="growH" type="number" step="0.01" placeholder="예: 9.97"></div>
        <div><label>표기 성장 · 공성</label><input id="growA" type="number" step="0.01" placeholder="예: 2.41"></div>
        <div><label>표기 성장 · 방성</label><input id="growD" type="number" step="0.01" placeholder="예: 1.43"></div>
        <div><label>표기 성장 · 순성</label><input id="growG" type="number" step="0.01" placeholder="예: 1.21"></div>
      </div>

      <div class="row3" style="margin-top:10px">
        <div>
          <label>랭크 선택</label>
          <select id="rankMode">
            <option value="auto">자동(권장)</option>
            <option value="R1">R1</option><option value="R2">R2</option><option value="R3">R3</option>
            <option value="R4">R4</option><option value="R5">R5</option><option value="R6">R6</option>
          </select>
        </div>
        <div>
          <label>최대 후보 수</label>
          <input id="maxCand" type="number" value="120" min="10" step="10"/>
        </div>
      </div>

      <div class="row" style="margin-top:12px">
        <button class="btn-ok" id="btnSolve">후보 역산</button>
        <div style="display:flex;gap:8px">
          <button class="btn" id="btnSaveLS">StageB로 저장</button>
          <button class="btn" id="btnDownload">JSON 내보내기</button>
          <button class="btn" id="btnClear">저장 초기화</button>
        </div>
      </div>
      <div class="muted" style="margin-top:8px">
        ※ 이 버전은 당신이 “정상값”을 보셨던 방식과 동일한 로직(그리드 스캔·평균B·(base−4.5) 성장 근사)을 사용합니다.
      </div>
    </div>
  </section>

  <section class="card">
    <h2>후보 상위N <span id="sum" class="muted"></span></h2>
    <div class="body" style="padding-top:8px">
      <div style="overflow:auto;max-height:60vh">
        <table>
          <thead><tr>
            <th>#</th><th>랭크</th><th>initnum</th><th>baseS [H/A/D/G]</th><th>score</th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div class="muted" style="margin-top:8px">저장 키: <span id="lsKey" class="mono">(미저장)</span></div>
    </div>
  </section>
</main>

<script>
// ===== 공통 상수 =====
const BRANGE={R1:[450,500],R2:[470,520],R3:[490,540],R4:[510,560],R5:[530,580],R6:[550,600]};
function visFromInternal(h,a,d,g){return [4*h+a+d+g, 0.1*h+a+0.1*d+0.05*g, 0.1*h+0.1*a+d+0.05*g, g];}

// 성장률 근사: baseS에서 내부 s=(baseS-4.5)와 평균 B로 per-level 증가량 근사 → 표기 성장으로 변환
function growFromBase(baseS, rank){
  const s = baseS.map(x=>x-4.5);
  const [lo,hi]=BRANGE[rank]||[490,540]; const B=(lo+hi)/2;
  const gh = s[0]*B/10000, ga = s[1]*B/10000, gd = s[2]*B/10000, gg = s[3]*B/10000;
  return visFromInternal(gh,ga,gd,gg);
}

// 초기 표기 근사: Aavg=2.5만 반영 (※ 평균 +2.5만, +2는 사용하지 않음)
function initFromBase(initnum, baseS){
  const A=2.5;
  const ih = initnum*(baseS[0]+A)/100;
  const ia = initnum*(baseS[1]+A)/100;
  const id = initnum*(baseS[2]+A)/100;
  const ig = initnum*(baseS[3]+A)/100;
  return visFromInternal(ih,ia,id,ig);
}

// L2 제곱 오차
const diff2=(a,b)=>a.reduce((s,_,i)=>{const d=a[i]-b[i];return s+d*d;},0);

// ===== 후보 역산 (그리드 스캔 방식: 당신이 확인했던 “정상 JSON” 생성기) =====
function solveCandidates(targetInit, targetGrow, rankSel){
  const ranks = rankSel==='auto' ? ['R1','R2','R3','R4','R5','R6'] : [rankSel];
  const out=[];
  for (let initnum=20; initnum<=35; initnum++){
    for (const rk of ranks){
      for (let h=24; h<=36; h+=2){
        for (let a=34; a<=50; a+=2){
          for (let d=14; d<=24; d+=2){
            for (let g=18; g<=28; g+=2){
              const baseS=[h,a,d,g];
              const initPred = initFromBase(initnum, baseS);
              const growPred = growFromBase(baseS, rk);
              const sInit = diff2(initPred, targetInit);
              const sGrow = diff2(growPred, targetGrow);
              const score = 1e6/(1 + sInit*4 + sGrow*1);
              out.push({rank:rk, initnum, base:baseS, score});
            }
          }
        }
      }
    }
  }
  return out.sort((x,y)=>y.score-x.score);
}

// ===== UI =====
const $=id=>document.getElementById(id);
const tbody=$('tbody'); const sum=$('sum'); const lsKey=$('lsKey');
let current=[];

function readInputs(){
  const petName = $('petName').value.trim();
  const initRound = $('initRound').value;
  const initDisp=[+$('initH').value, +$('initA').value, +$('initD').value, +$('initG').value];
  const growDisp=[+$('growH').value, +$('growA').value, +$('growD').value, +$('growG').value];
  if(initDisp.some(isNaN)||growDisp.some(isNaN)) throw new Error('입력 누락');
  const rankMode = $('rankMode').value;
  const maxCand = Math.max(10, +$('maxCand').value|0);
  return {petName, initRound, initDisp, growDisp, rankMode, maxCand};
}

$('btnSolve').onclick=()=>{
  try{
    const s=readInputs();
    const all = solveCandidates(s.initDisp, s.growDisp, s.rankMode);
    current = all.slice(0, s.maxCand);
    tbody.innerHTML='';
    current.forEach((c,i)=>{
      const tr=document.createElement('tr');
      tr.innerHTML = `<td>${i+1}</td><td>${c.rank}</td><td>${c.initnum}</td><td>[${c.base.map(v=>v.toFixed(3)).join(' / ')}]</td><td>${c.score.toFixed(3)}</td>`;
      tbody.appendChild(tr);
    });
    sum.textContent = `· 후보 ${current.length}개`;
  }catch(e){ alert(e.message); }
};

$('btnDownload').onclick=()=>{
  try{
    const s=readInputs();
    const payload={ petName:s.petName, targetGrow:s.growDisp, initRound:s.initRound, candidates: current };
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download=`${s.petName||'pet'}_candidates.json`; a.click();
  }catch(e){ alert(e.message); }
};

$('btnSaveLS').onclick=()=>{
  try{
    const s=readInputs();
    const key=`StageA_${s.petName||'pet'}`;
    const payload={ petName:s.petName, targetGrow:s.growDisp, initRound:s.initRound, candidates: current };
    localStorage.setItem(key, JSON.stringify(payload));
    localStorage.setItem('petCalcCandidates', JSON.stringify(payload)); // StageB 자동 인식용
    lsKey.textContent = key;
    alert('저장 완료: StageB에서 불러올 수 있습니다.');
  }catch(e){ alert(e.message); }
};

$('btnClear').onclick=()=>{
  try{
    const s=readInputs();
    const key=`StageA_${s.petName||'pet'}`;
    localStorage.removeItem(key);
    if(localStorage.getItem('petCalcCandidates')){
      const obj=JSON.parse(localStorage.getItem('petCalcCandidates')||'{}');
      if(obj.petName===s.petName) localStorage.removeItem('petCalcCandidates');
    }
    lsKey.textContent='(삭제됨)';
    alert('저장된 항목을 지웠습니다.');
  }catch(e){ alert(e.message); }
};
</script>
</body>
</html>
