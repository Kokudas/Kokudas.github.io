<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>StoneAge 단계A – 역산(계수 추정)</title>
<style>
:root{--bg:#0b1020;--card:#121830;--ink:#e8ecff;--muted:#a8b2d1;--accent:#7aa2ff;--radius:16px}
*{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#0b1020,#0e1630 60%,#0b1020);color:var(--ink);font:15px/1.6 system-ui,Segoe UI,Apple SD Gothic Neo,Noto Sans KR,Roboto,Arial,sans-serif}
a{color:#cdd7ff;text-decoration:none}
nav{position:sticky;top:0;z-index:99;background:#0a122a;border-bottom:1px solid #283052;padding:8px 16px;display:flex;gap:12px;align-items:center}
.wrap{max-width:1100px;margin:28px auto;padding:0 16px}
.card{background:#121830;border:1px solid #283052;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.35);padding:18px}
.row{display:flex;gap:12px;flex-wrap:wrap} label{display:block;color:#a8b2d1;margin-bottom:6px;font-weight:600}
.input{background:#0c1230;border:1px solid #2a335d;border-radius:12px;color:#e8ecff;padding:10px 12px;width:100%}
.input:focus{border-color:#7aa2ff;box-shadow:0 0 0 3px rgba(122,162,255,.12)}
.btn{cursor:pointer;background:#7aa2ff;border:none;color:#0b1020;padding:12px 16px;border-radius:12px;font-weight:700}
.small{font-size:12px;color:#a8b2d1}
table{width:100%;border-collapse:separate;border-spacing:0} th,td{padding:9px;border-bottom:1px solid #283052} th{color:#cdd7ff;text-align:left}
.kpi{display:flex;gap:12px;flex-wrap:wrap} .chip{padding:10px 12px;border-radius:12px;background:#0c1230;border:1px solid #2a335d}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(3px);z-index:9999;align-items:center;justify-content:center}
.spinner{margin:0 auto 10px;width:34px;height:34px;border:3px solid transparent;border-top-color:#7aa2ff;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
  <nav>
    <a href="https://kokudas.github.io/stageA.html">단계A(역산)</a> <span style="opacity:.5">|</span>
    <a href="https://kokudas.github.io/stageB.html">단계B(S확률)</a>
    <span id="banner" style="margin-left:auto;color:#a8b2d1;font-size:12px">Ready</span>
  </nav>

  <div class="wrap">
    <h1>단계A – 계수 역산 & 후보 저장</h1>
    <p class="small">소숫점 둘째자리의 <b>표기 초기치</b>(HP/ATK/DEF/AGI)와 <b>표기 성장치</b>를 넣으면, 가능한 <b>(initnum, base[체공방순], Rank)</b> 후보를 자동 추정/선별해 <b>페트 이름</b>으로 저장합니다.</p>

    <div class="card">
      <h2>입력</h2>
      <div class="row">
        <div style="flex:1 1 220px"><label>페트 이름</label><input id="pet_name" class="input" placeholder="예) 반기노"/></div>
        <div style="flex:1 1 160px"><label>초기 HP</label><input id="hp0" class="input" type="number" step="0.01" placeholder="예) 52.39"/></div>
        <div style="flex:1 1 160px"><label>초기 ATK</label><input id="atk0" class="input" type="number" step="0.01" placeholder="12.64"/></div>
        <div style="flex:1 1 160px"><label>초기 DEF</label><input id="def0" class="input" type="number" step="0.01" placeholder="7.49"/></div>
        <div style="flex:1 1 160px"><label>초기 AGI</label><input id="agi0" class="input" type="number" step="0.01" placeholder="6.37"/></div>
      </div>
      <div class="row">
        <div style="flex:1 1 160px"><label>성장 HP</label><input id="hpU" class="input" type="number" step="0.01" placeholder="9.97"/></div>
        <div style="flex:1 1 160px"><label>성장 ATK</label><input id="atkU" class="input" type="number" step="0.01" placeholder="2.41"/></div>
        <div style="flex:1 1 160px"><label>성장 DEF</label><input id="defU" class="input" type="number" step="0.01" placeholder="1.43"/></div>
        <div style="flex:1 1 160px"><label>성장 AGI</label><input id="agiU" class="input" type="number" step="0.01" placeholder="1.21"/></div>
      </div>

      <details style="margin-top:8px" open>
        <summary><b>옵션</b></summary>
        <div class="row" style="margin-top:8px">
          <div style="flex:1 1 160px"><label>initnum 범위</label><input id="initMin" class="input" type="number" value="10"/><small class="small">최소</small></div>
          <div style="flex:1 1 160px"><label>&nbsp;</label><input id="initMax" class="input" type="number" value="40"/><small class="small">최대</small></div>
          <div style="flex:1 1 220px"><label>base 탐색폭 (±)</label><input id="baseSpan" class="input" type="number" value="5"/></div>
          <div style="flex:1 1 220px"><label>초기치 허용 오차 ε₀</label><input id="eps0" class="input" type="number" step="0.01" value="0.03"/></div>
          <div style="flex:1 1 220px"><label>초기 표기 정수화</label>
            <select id="roundMode" class="input">
              <option value="floor">버림(Math.floor)</option>
              <option value="round">반올림(Math.round)</option>
            </select>
          </div>
        </div>
      </details>

      <div class="row" style="margin-top:12px;align-items:flex-end">
        <button id="btnSolve" class="btn">후보 추정 & 저장</button>
        <button id="btnExport" class="btn" style="background:#37d67a">JSON 내보내기</button>
        <span id="status" class="small" style="margin-left:10px"></span>
      </div>
    </div>

    <div class="card" style="margin-top:16px">
      <h2>자동 선별된 후보 (상위 200)</h2>
      <div class="kpi" id="kpi"></div>
      <div style="max-height:460px;overflow:auto;margin-top:8px">
        <table>
          <thead><tr><th>#</th><th>Rank</th><th>initnum</th><th>base[체,공,방,순]</th><th>score</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="overlay"><div class="card" style="min-width:260px;text-align:center">
    <div class="spinner"></div>
    <div id="overlayText">계산 중…</div>
  </div></div>

<script>
const KEY = (name)=> `stoneage_rev_candidates_${name||''}`;
const precise = x=> Math.round(x*1e12)/1e12;

function toPure(HP,ATK,DEF,AGI){
  const V =  0.261904761904762*HP - 0.238095238095238*ATK - 0.238095238095238*DEF - 0.238095238095238*AGI;
  const S = -0.0238095238095238*HP + 1.03174603174603*ATK - 0.0793650793650794*DEF - 0.0238095238095238*AGI;
  const T = -0.0238095238095238*HP - 0.0793650793650794*ATK + 1.03174603174603*DEF - 0.0238095238095238*AGI;
  const D =  AGI;
  return [V,S,T,D];
}
function toDisp(v,s,t,d){
  return [precise(4*v+s+t+d), precise(0.1*v+s+0.1*t+0.05*d), precise(0.1*v+0.1*s+t+0.05*d), precise(d)];
}
const RANKS={R1:[450,500],R2:[470,520],R3:[490,540],R4:[510,560],R5:[530,580],R6:[550,600]};

function solveAndSave(){
  const name=(document.getElementById('pet_name').value||'').trim();
  if(!name){alert('페트 이름을 입력하세요.');return;}
  const init=[parseFloat(hp0.value),parseFloat(atk0.value),parseFloat(def0.value),parseFloat(agi0.value)];
  const grow=[parseFloat(hpU.value),parseFloat(atkU.value),parseFloat(defU.value),parseFloat(agiU.value)];
  if(init.some(x=>!Number.isFinite(x))||grow.some(x=>!Number.isFinite(x))){alert('초기/성장 정보를 모두 입력하세요.');return;}

  const [V0,S0,T0,D0]=toPure(...init);
  const roundMode=roundModeSel.value; const initMin=+initMinInp.value; const initMax=+initMaxInp.value; const span=+baseSpan.value; const eps0=+eps0Inp.value;

  const candidates=[];
  for(let initnum=initMin; initnum<=initMax; initnum++){
    const est = [V0,S0,T0,D0].map(x=> x*100/initnum);
    for(let dv=-span; dv<=span; dv++){
      for(let ds=-span; ds<=span; ds++){
        for(let dt=-span; dt<=span; dt++){
          for(let dd=-span; dd<=span; dd++){
            const base=[est[0]+dv, est[1]+ds, est[2]+dt, est[3]+dd];
            const V=precise(initnum*base[0]/100), S=precise(initnum*base[1]/100), T=precise(initnum*base[2]/100), D=precise(initnum*base[3]/100);
            const disp=toDisp(V,S,T,D);
            if( Math.abs(disp[0]-init[0])<=eps0 && Math.abs(disp[1]-init[1])<=eps0 &&
                Math.abs(disp[2]-init[2])<=eps0 && Math.abs(disp[3]-init[3])<=eps0){
              for(const [rk,[b0,b1]] of Object.entries(RANKS)){
                const B= (b0+b1)/2;
                const uV=precise(base[0]*B/10000), uS=precise(base[1]*B/10000), uT=precise(base[2]*B/10000), uD=precise(base[3]*B/10000);
                const ug=toDisp(uV,uS,uT,uD);
                const err = Math.abs(ug[0]-grow[0])+Math.abs(ug[1]-grow[1])+Math.abs(ug[2]-grow[2])+Math.abs(ug[3]-grow[3]);
                const score = 1/(1e-6 + err);
                candidates.push({rank:rk, initnum, base:base.map(x=>Number(x.toFixed(3))), score});
              }
            }
          }
        }
      }
    }
  }

  candidates.sort((a,b)=> b.score-a.score);
  const top = candidates.slice(0,200);

  // 이름 키도 함께 저장 (stageB 호환)
  localStorage.setItem('stoneage_pet_name', name);
  const payload = {petName:name, targetGrow:grow, initRound:roundMode, candidates:top};
  localStorage.setItem(KEY(name), JSON.stringify(payload));

  // 표
  const tbody=document.getElementById('tbody'); tbody.innerHTML='';
  top.forEach((c,i)=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${i+1}</td><td>${c.rank}</td><td>${c.initnum}</td><td>[${c.base.join(', ')}]</td><td>${c.score.toFixed(4)}</td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('kpi').innerHTML=`<div class="chip">저장 키: <b>${KEY(name)}</b></div> <div class="chip">후보 수: <b>${top.length}</b></div>`;
  alert(`후보 ${top.length}건을 저장했습니다. 단계B에서 같은 이름("${name}")으로 불러와 계산하세요.`);
}

function exportJSON(){
  const name=(document.getElementById('pet_name').value||'').trim();
  if(!name){alert('페트 이름을 먼저 입력/저장하세요.');return;}
  const raw=localStorage.getItem(KEY(name));
  if(!raw){alert('저장된 후보가 없습니다.');return;}
  const blob=new Blob([raw],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`${name}_candidates.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

const hp0=document.getElementById('hp0'), atk0=document.getElementById('atk0'), def0=document.getElementById('def0'), agi0=document.getElementById('agi0');
const hpU=document.getElementById('hpU'), atkU=document.getElementById('atkU'), defU=document.getElementById('defU'), agiU=document.getElementById('agiU');
const initMinInp=document.getElementById('initMin'), initMaxInp=document.getElementById('initMax'), baseSpan=document.getElementById('baseSpan'), eps0Inp=document.getElementById('eps0'), roundModeSel=document.getElementById('roundMode');

document.getElementById('btnSolve').addEventListener('click', ()=>{
  document.getElementById('overlay').style.display='flex';
  document.getElementById('overlayText').textContent='후보 추정 중…';
  setTimeout(()=>{ solveAndSave(); document.getElementById('overlay').style.display='none'; }, 50);
});
document.getElementById('btnExport').addEventListener('click', exportJSON);
</script>
</body>
</html>
