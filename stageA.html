<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>StageA – 후보 역산 (소수점 → baseS/initnum/rank)</title>
<style>
  :root{
    --bg:#0b1220; --panel:#121a2b; --ink:#e9edf6; --muted:#a9b3c7; --accent:#5aa9ff;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", "Malgun Gothic", sans-serif}
  a{color:var(--accent);text-decoration:none}
  header,main,footer{max-width:1100px;margin:0 auto;padding:16px}
  .btn{background:#1b2742;color:var(--ink);border:1px solid #2a385a;border-radius:10px;padding:10px 14px;cursor:pointer}
  .btn:hover{background:#223255}
  .row{display:flex;gap:16px;flex-wrap:wrap}
  .col{flex:1;min-width:280px}
  .card{background:var(--panel);border:1px solid #1f2a45;border-radius:14px;padding:16px}
  h1,h2,h3{margin:6px 0 12px}
  small,.muted{color:var(--muted)}
  input,select,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #2a385a;background:#0e1628;color:var(--ink)}
  table{width:100%;border-collapse:collapse}
  th,td{border-bottom:1px solid #223155;padding:10px;text-align:right}
  th:first-child, td:first-child{text-align:left}
  .mono{font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace}
  .pill{display:inline-block;border-radius:999px;padding:2px 8px;font-weight:600;border:1px solid #2a385a}
  footer{color:var(--muted);font-size:13px}
</style>
</head>
<body>
<header class="row" style="align-items:center">
  <a class="btn" href="https://kokudas.github.io/">홈으로</a>
  <a class="btn" href="https://kokudas.github.io/stageB">StageB (정수초기치+환각)</a>
  <h3 style="margin-left:auto">StageA – 후보 역산</h3>
</header>

<main class="row">
  <section class="col card">
    <h2>입력(소수점 2자리)</h2>
    <div class="row">
      <div class="col">
        <label>페트 이름(선택)</label>
        <input id="petName" placeholder="예: 반기노" />
      </div>
      <div class="col">
        <label>초기치 반올림 방식</label>
        <select id="initRound">
          <option value="floor">내림(floor)</option>
          <option value="round">반올림(round)</option>
        </select>
      </div>
    </div>

    <h3 style="margin-top:10px">① 표기 초기치 (소수점)</h3>
    <div class="row">
      <div class="col"><input id="initH" placeholder="예: 52.39 (체)" /></div>
      <div class="col"><input id="initA" placeholder="예: 12.64 (공)" /></div>
      <div class="col"><input id="initD" placeholder="예: 7.49 (방)" /></div>
      <div class="col"><input id="initG" placeholder="예: 6.37 (순)" /></div>
    </div>

    <h3 style="margin-top:10px">② 표기 성장 (레벨당, 소수점)</h3>
    <div class="row">
      <div class="col"><input id="growH" placeholder="예: 9.97 (체성)" /></div>
      <div class="col"><input id="growA" placeholder="예: 2.41 (공성)" /></div>
      <div class="col"><input id="growD" placeholder="예: 1.43 (방성)" /></div>
      <div class="col"><input id="growG" placeholder="예: 1.21 (순성)" /></div>
    </div>

    <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn" id="btnSolve">후보 역산</button>
      <button class="btn" id="btnSaveLS">후보 저장(로컬)</button>
      <button class="btn" id="btnExport">JSON 다운로드</button>
    </div>
    <div id="msg" class="muted" style="margin-top:8px"></div>
  </section>

  <section class="col card">
    <h2>후보 출력</h2>
    <div class="muted">rank, initnum, baseS(표기 기준)와 점수(적합도)를 제공합니다.</div>
    <div style="overflow:auto;margin-top:8px">
      <table>
        <thead>
          <tr>
            <th>#</th><th>랭크</th><th>initnum</th><th>baseS [H/A/D/G]</th><th>score</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </section>
</main>

<footer>
  <div>ⓘ StageA는 <b>소수점</b> 초기치·성장을 입력받아 후보(<code>rank, initnum, baseS</code>)를 역산합니다. 정수 초기치 검증은 StageB에서 수행합니다.</div>
</footer>

<script>
// ===== 간단한 역산 스켈레톤(휴리스틱) =====
// 실제 게임 로직의 모든 변동/난수과정(±2, 보너스10, rank보정 등)을
// 정확히 재현하기 어려운 상황에서, 관측된 소수점 초기/성장과 가장
// 일관되게 맞는 (initnum, baseS, rank) 후보를 여러 개 생성합니다.

const BRANGE = {
  R1:[450,500], R2:[470,520], R3:[490,540],
  R4:[510,560], R5:[530,580], R6:[550,600],
};

// 가시표기 변환
function visFromInternal(h,a,d,g){
  return [
    4*h + a + d + g,
    0.1*h + a + 0.1*d + 0.05*g,
    0.1*h + 0.1*a + d + 0.05*g,
    g
  ];
}

// 아주 단순화: baseS와 initnum의 곱으로 소수점 초기치를 근사
function computeInitFromBaseS(initnum, baseS){
  const ih = initnum * baseS[0] / 100;
  const ia = initnum * baseS[1] / 100;
  const id = initnum * baseS[2] / 100;
  const ig = initnum * baseS[3] / 100;
  const vis = visFromInternal(ih, ia, id, ig);
  return vis; // 소수점 표기 초기치(가시계산)
}

// 성장도도 baseS에서 내부 s=(baseS-4.5)와 평균 B로 선형 근사
function computeGrowFromBaseS(baseS, rankKey){
  const s = baseS.map(x=>x-4.5);
  const br = BRANGE[rankKey]||[490,540];
  const B = (br[0]+br[1])/2;
  const gh = s[0] * B / 10000;
  const ga = s[1] * B / 10000;
  const gd = s[2] * B / 10000;
  const gg = s[3] * B / 10000;
  return visFromInternal(gh,ga,gd,gg);
}

function solveCandidates(targetInit, targetGrow, initRound){
  // 탐색 공간(간단): initnum 20~35, rank R1~R6, baseS를 비율 형태로 스캔
  const ranks = ['R1','R2','R3','R4','R5','R6'];
  const out=[];
  for (let initnum=20; initnum<=35; initnum++){
    for (const rk of ranks){
      // 비율은 체/공/방/순의 합 ~ 98±? 를 기준으로 반기노류 대역 가정
      for (let h=24; h<=36; h+=2){
        for (let a=34; a<=50; a+=2){
          for (let d=14; d<=24; d+=2){
            for (let g=18; g<=28; g+=2){
              const baseS = [h,a,d,g].map(x=>x/1); // 그대로 사용(표기기준)
              const initPred = computeInitFromBaseS(initnum, baseS);
              const growPred = computeGrowFromBaseS(baseS, rk);

              const sInit = diff2(initPred, targetInit);
              const sGrow = diff2(growPred, targetGrow);

              // 간단 가중 합
              const score = 1e6/(1 + sInit*4 + sGrow*1);

              out.push({rank:rk, initnum, base:baseS, score});
            }
          }
        }
      }
    }
  }
  // 상위만 반환
  return out.sort((a,b)=>b.score-a.score).slice(0,120);
}
function diff2(a,b){ // L2 norm^2
  let s=0; for (let i=0;i<4;i++){ const d=(a[i]-b[i]); s+=d*d; } return s;
}

const $ = s=>document.getElementById(s);
const tbody = $("tbody");
const msg = $("msg");

$("btnSolve").addEventListener('click', ()=>{
  try{
    const petName = $("petName").value.trim();
    const initRound = $("initRound").value;

    const tInit = [+$("initH").value, +$("initA").value, +$("initD").value, +$("initG").value];
    const tGrow = [+$("growH").value, +$("growA").value, +$("growD").value, +$("growG").value];
    if (tInit.some(isNaN)||tGrow.some(isNaN)){ alert('소수점 초기치/성장을 모두 숫자로 입력하세요.'); return; }

    const cand = solveCandidates(tInit, tGrow, initRound);
    tbody.innerHTML = '';
    cand.forEach((c,i)=>{
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${i+1}</td>
        <td>${c.rank}</td>
        <td>${c.initnum}</td>
        <td class="mono">[${c.base.map(v=>v.toFixed(3)).join(' / ')}]</td>
        <td>${c.score.toFixed(3)}</td>
      `;
      tbody.appendChild(tr);
    });

    // StageB 전달용으로 저장할 오브젝트
    const payload = { petName, targetGrow: tGrow, initRound, candidates: cand };
    window._lastPayload = payload;
    msg.innerHTML = `후보 ${cand.length}개. <span class="pill">StageB에서 정수 초기치로 검증하세요.</span>`;

  }catch(e){
    console.error(e);
    alert('역산 중 오류: '+e.message);
  }
});

$("btnSaveLS").addEventListener('click', ()=>{
  if (!window._lastPayload){ alert('먼저 후보를 생성하세요.'); return; }
  localStorage.setItem('petCalcCandidates', JSON.stringify(window._lastPayload));
  msg.textContent = '로컬 저장소에 저장 완료 (petCalcCandidates). StageB에서 자동 불러올 수 있습니다.';
});

$("btnExport").addEventListener('click', ()=>{
  if (!window._lastPayload){ alert('먼저 후보를 생성하세요.'); return; }
  const blob = new Blob([JSON.stringify(window._lastPayload)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (window._lastPayload.petName||'pet') + '_candidates.json';
  a.click();
});
</script>
</body>
</html>
