<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>StageA v0.7 · 성장계수 추정</title>
  <style>
    :root{--bg:#0b1220;--card:#111a2b;--muted:#8aa0bd;--pri:#7aa2ff;--ok:#19c37d;--warn:#ffb545;--bad:#ff5c5c}
    *{box-sizing:border-box}
    body{margin:0;background:linear-gradient(180deg,#0b1220,#0e1729);font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;color:#e7eef8}
    header{position:sticky;top:0;z-index:10;background:rgba(11,18,32,.8);backdrop-filter:blur(6px);border-bottom:1px solid #1e2a44}
    header .wrap{display:flex;align-items:center;gap:12px;max-width:1100px;margin:0 auto;padding:12px 16px}
    header a{color:var(--pri);text-decoration:none;font-weight:600}
    .pill{padding:6px 10px;border:1px solid #2a3a5e;border-radius:999px;background:#0e1628;color:#cfe0ff}
    main{max-width:1100px;margin:24px auto;padding:0 16px;display:grid;grid-template-columns:1.1fr .9fr;gap:18px}
    @media (max-width:980px){main{grid-template-columns:1fr}}
    .card{background:var(--card);border:1px solid #1a2540;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
    .card h2{margin:0;padding:14px 16px;border-bottom:1px solid #1e2a44;font-size:18px;color:#d8e6ff}
    .card .body{padding:16px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .row4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    label{font-size:12px;color:var(--muted);display:block;margin-bottom:6px}
    input,select,button{width:100%;padding:10px 12px;border-radius:10px;border:1px solid #253250;background:#0d1526;color:#e7eef8}
    button{cursor:pointer;font-weight:700}
    .btn{background:#132347;border-color:#2a3a5e}
    .btn:hover{background:#162a55}
    .btn-ok{background:var(--ok);border-color:#18a56d;color:#04120d}
    .btn-ok:hover{filter:brightness(1.05)}
    .muted{color:var(--muted);font-size:13px}
    .grid{display:grid;gap:8px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px 8px;border-bottom:1px solid #1e2a44;font-size:13px;text-align:right}
    th{text-align:center;color:#bcd1ff}
    td:nth-child(1),th:nth-child(1){text-align:center}
    .footer{padding:16px;color:var(--muted);font-size:12px}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace}
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <strong>StageA v0.7 · 성장계수 추정</strong>
      <a class="pill" href="./stageB.html">➡️ StageB로 이동</a>
    </div>
  </header>

  <main>
    <section class="card">
      <h2>입력 · 표기 초기치(소수2자리) + 성장치(소수2자리)</h2>
      <div class="body grid">
        <div class="row">
          <div>
            <label>페트 이름</label>
            <input id="petName" placeholder="예: 반기노" />
          </div>
          <div>
            <label>라운딩 규칙</label>
            <select id="initRound">
              <option value="floor">바닥(Floor)</option>
              <option value="round">반올림(Round)</option>
              <option value="ceil">올림(Ceil)</option>
            </select>
          </div>
        </div>

        <div class="row4">
          <div><label>초기·체</label><input id="initH" type="number" step="0.01"></div>
          <div><label>초기·공</label><input id="initA" type="number" step="0.01"></div>
          <div><label>초기·방</label><input id="initD" type="number" step="0.01"></div>
          <div><label>초기·순</label><input id="initG" type="number" step="0.01"></div>
        </div>

        <div class="row4">
          <div><label>성장·체성</label><input id="growH" type="number" step="0.01"></div>
          <div><label>성장·공성</label><input id="growA" type="number" step="0.01"></div>
          <div><label>성장·방성</label><input id="growD" type="number" step="0.01"></div>
          <div><label>성장·순성</label><input id="growG" type="number" step="0.01"></div>
        </div>

        <div class="row">
          <button class="btn-ok" id="btnSolve">계수 추정</button>
          <div style="display:flex;gap:8px">
            <button class="btn" id="btnSaveLS">StageB로 저장</button>
            <button class="btn" id="btnDownload">JSON 내보내기</button>
            <button class="btn" id="btnClearLS">저장 초기화</button>
          </div>
        </div>
        <div class="muted">※ StageA는 짜얄 계산기와 유사하게 초기치/성장을 입력받아 성장계수를 추정합니다.</div>
      </div>
    </section>

    <section class="card">
      <h2>추정 결과</h2>
      <div class="body">
        <table><thead><tr><th>initnum</th><th>체</th><th>공</th><th>방</th><th>순</th></tr></thead><tbody id="tbl"></tbody></table>
      </div>
    </section>
  </main>

<script>
function estimateCoefficients(initDisp,growDisp){
  // 성장률 기반 단순 선형 추정 (짜얄식 근사)
  const icCandidates=[20,24,28,31,32,33,34,35];
  let best=null;
  for(const ic of icCandidates){
    const baseH=(growDisp[0]*100/ic)-2.5;
    const baseA=(growDisp[1]*100/ic)-2.5;
    const baseD=(growDisp[2]*100/ic)-2.5;
    const baseG=(growDisp[3]*100/ic)-2.5;
    if([baseH,baseA,baseD,baseG].some(v=>v<=0)) continue;
    const diff=Math.abs((initDisp[0]*0.25)-baseH)+Math.abs((initDisp[1])-baseA);
    if(!best||diff<best.diff) best={ic,base:[baseH.toFixed(2),baseA.toFixed(2),baseD.toFixed(2),baseG.toFixed(2)],diff};
  }
  return best;
}

const els={initH:document.getElementById('initH'),initA:document.getElementById('initA'),initD:document.getElementById('initD'),initG:document.getElementById('initG'),growH:document.getElementById('growH'),growA:document.getElementById('growA'),growD:document.getElementById('growD'),growG:document.getElementById('growG'),tbl:document.getElementById('tbl'),btnSolve:document.getElementById('btnSolve'),btnSaveLS:document.getElementById('btnSaveLS'),btnDownload:document.getElementById('btnDownload'),btnClearLS:document.getElementById('btnClearLS'),petName:document.getElementById('petName')};

let lastResult=null;

els.btnSolve.onclick=()=>{
  const initDisp=[parseFloat(els.initH.value),parseFloat(els.initA.value),parseFloat(els.initD.value),parseFloat(els.initG.value)];
  const growDisp=[parseFloat(els.growH.value),parseFloat(els.growA.value),parseFloat(els.growD.value),parseFloat(els.growG.value)];
  if(initDisp.some(isNaN)||growDisp.some(isNaN)){alert('값을 모두 입력하세요');return;}
  const est=estimateCoefficients(initDisp,growDisp);
  els.tbl.innerHTML= est? `<tr><td>${est.ic}</td><td>${est.base[0]}</td><td>${est.base[1]}</td><td>${est.base[2]}</td><td>${est.base[3]}</td></tr>` : '<tr><td colspan="5">추정 불가</td></tr>';
  lastResult={petName:els.petName.value,initDisp,growDisp,estimate:est};
};

els.btnSaveLS.onclick=()=>{if(!lastResult){alert('먼저 추정 실행 필요');return;}localStorage.setItem('petCalcCandidates',JSON.stringify(lastResult));alert('StageB에서 불러올 수 있습니다');};
els.btnDownload.onclick=()=>{if(!lastResult){alert('먼저 추정 실행 필요');return;}const blob=new Blob([JSON.stringify(lastResult,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${lastResult.petName||'pet'}_candidates.json`;a.click();};
els.btnClearLS.onclick=()=>{localStorage.removeItem('petCalcCandidates');alert('저장 초기화 완료');};
</script>
</body>
</html>
